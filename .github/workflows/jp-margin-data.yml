name: Update JP Margin Supply Data

on:
  schedule:
    - cron: '50 9 * * 1-5' # 18:50 JST on weekdays
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tools/update_jp_margin.py'
      - 'public/data/jp-margin.json'
      - '.github/workflows/jp-margin-data.yml'

permissions:
  contents: write

concurrency:
  group: jp-margin-data
  cancel-in-progress: false

jobs:
  update:
    if: github.actor != 'github-actions[bot]' || github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install parser dependencies
        run: pip install --disable-pip-version-check requests beautifulsoup4 pdfplumber
      - name: Parser self-test
        run: python tools/update_jp_margin.py --self-test
      - name: Download and validate official JPX data
        run: python tools/update_jp_margin.py --output public/data/jp-margin.json --min-count 1000
      - name: Commit updated data
        run: |
          if git diff --quiet -- public/data/jp-margin.json; then
            echo "No JP margin data change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/jp-margin.json
          git commit -m "Update official JP margin supply data"
          git push

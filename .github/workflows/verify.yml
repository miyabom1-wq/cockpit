name: Verify VANTAGE

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'public/**'
      - '.github/workflows/verify.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Normalize npm registry
        run: |
          sed -i 's#https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/#https://registry.npmjs.org/#g' package-lock.json
          if grep -q 'packages.applied-caas-gateway1.internal.api.openai.org' package-lock.json; then
            echo 'Internal npm registry URL still remains in package-lock.json.'
            exit 1
          fi

      - name: Install
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Worker dry run
        run: npm run dry-run

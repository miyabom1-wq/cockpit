name: Verify VANTAGE

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'public/**'
      - '.github/workflows/verify.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Worker dry run
        run: npm run dry-run

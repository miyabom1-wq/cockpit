name: Update US Earnings Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: '20 20 * * *'
  push:
    branches:
      - main
    paths:
      - 'tools/update_us_earnings.py'
      - '.github/workflows/update-us-earnings.yml'

permissions:
  contents: write

concurrency:
  group: update-us-earnings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependency
        run: python -m pip install --disable-pip-version-check requests

      - name: Download Nasdaq earnings calendar
        run: python tools/update_us_earnings.py

      - name: Validate output
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('public/data/us_earnings.json').read_text(encoding='utf-8'))
          assert data['schema'] == 'vantage-us-earnings-v1'
          assert isinstance(data['events'], list) and data['events']
          print('events:', len(data['events']))
          PY

      - name: Commit updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/us_earnings.json
          if git diff --cached --quiet; then
            echo "No calendar changes"
          else
            git commit -m "Update US earnings calendar"
            git push
          fi

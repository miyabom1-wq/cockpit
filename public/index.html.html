 if(ev)html+=`<div class="section-title">次の重要日程</div><div class="card pad event-next"><div class="event-ic">${icon('calendar',18)}</div><div class="grow1"><div class="event-name">${esc(ev.name)}</div><div class="event-time">${dateText(ev.time)}</div></div></div>`;

 const r5=Number(ix?.ret5),r20=Number(ix?.ret20);
 if(Number.isFinite(r5)&&Number.isFinite(r20)&&r5>=1&&r20>=0)return'up';
 if((Number.isFinite(r5)&&r5<=-1.5)||(Number.isFinite(r20)&&r20<=-3))return'weak';

function currentFeature(r,m){return{market_regime:currentMarketRegime(m),vol_ratio:Number(r.effective_vol_ratio??r.vol_ratio),rs5:Number(r.rs5),div25:Number(r.div25),close_pos:Number(r.close_pos),setup:r.setup_code||null}}
function currentPredicate(id,f){
 switch(id){
  case'regime_up':return f.market_regime==='up';case'regime_not_weak':return f.market_regime!=='weak';
  case'vol_1_0':return Number.isFinite(f.vol_ratio)&&f.vol_ratio>=1;case'vol_1_2':return Number.isFinite(f.vol_ratio)&&f.vol_ratio>=1.2;case'vol_1_5':return Number.isFinite(f.vol_ratio)&&f.vol_ratio>=1.5;
  case'rs5_0':return Number.isFinite(f.rs5)&&f.rs5>=0;case'rs5_2':return Number.isFinite(f.rs5)&&f.rs5>=2;case'rs5_5':return Number.isFinite(f.rs5)&&f.rs5>=5;
  case'div25_m3_3':return Number.isFinite(f.div25)&&f.div25>=-3&&f.div25<=3;case'div25_0_5':return Number.isFinite(f.div25)&&f.div25>=0&&f.div25<=5;
  case'close_0_6':return Number.isFinite(f.close_pos)&&f.close_pos>=.6;case'close_0_75':return Number.isFinite(f.close_pos)&&f.close_pos>=.75;
  case'setup_thrust':return f.setup==='reversal_thrust'||f.setup==='ipo_momentum';default:return false;
 }
}
function selectiveRulesFor(r,m){

 if(state.backtest?.status!=='complete')h+=`<span class="badge C">再集計 ${p.done||0}/${p.total||0}</span>`;else h+=`<span class="badge A">${all.length}件</span>`;h+='</div>';
 if(state.backtest?.status!=='complete'&&!sel?.confirmed?.length)h+='<div class="selective-empty">新しい厳選エンジンを再集計中です。全登録銘柄が完了するまでは、厳選判定を出しません。</div>';
 else if(!(sel?.confirmed||[]).length)h+='<div class="selective-empty">未使用期間60%・期待値・PF・中央値を同時に満たす条件はまだありません。無理に候補を出さない状態です。</div>';
 else if(!all.length)h+='<div class="selective-empty">本日は厳選条件に一致するA/Bがありません。通常候補は下のボードで確認できます。</div>';
 else for(const x of all){const r=x.r,rule=x.rule;h+=`<div class="selective-card" onclick="openCandidate('${attr(r.symbol)}')"><div class="selective-card-head"><span class="badge ${r.entry_lane}">${esc(r.entry_quality||r.entry_lane)}</span><span class="name grow1">${esc(r.name)}</span><span class="code">${esc(code(r.symbol))}</span>${r.focus_tier==='radar'?'<span class="tier-badge">レーダー浮上</span>':''}<span class="strict-badge">厳選条件一致</span></div><div class="selective-rule">${esc((rule.labels||[]).join('・'))}</div><div class="selective-stats"><span>最終試験 勝率 ${num(rule.test?.win_rate,1)}%</span><span>期待値 ${pct(rule.test?.expectancy)}</span><span>PF ${num(rule.test?.profit_factor)}</span><span>n=${rule.test?.trades||0}</span><span>翌日高値突破待ち</span></div></div>`;}

function boardAuditSummary(m,mom){

function btVerdict(m,recent){
 const n=m?.trades||0;if(n<30)return{label:'蓄積中',kind:''};
 if((m.expectancy??0)<=0||(m.profit_factor??0)<1)return{label:'優位性なし',kind:'bad'};
 if((recent?.trades||0)>=10&&(recent.expectancy??0)<0)return{label:'直近弱化',kind:'warn'};
 if((m.expectancy??0)>=.5&&(m.profit_factor??0)>=1.4&&(m.median_return??-99)>0)return{label:'条件分解候補',kind:'warn'};
 return{label:'弱い優位性',kind:''};
}
function btMetric(v,label,format='pct'){
 const text=v==null?'—':format==='pct'?pct(v):format==='num'?num(v):String(v);
 return `<div class="bt-metric"><div class="v">${text}</div><div class="k">${label}</div></div>`;
}
function ruleCard(rule,research=false){
 const v=rule.validation||{},t=rule.test||{},h=rule.holdout||{};
 return `<div class="rule-card"><div class="rule-head"><span class="badge ${rule.strategy==='A'||rule.strategy==='C_A'?'A':'B'}">${rule.strategy.replace('_','→')}</span><span class="rule-name">${rule.market==='jp'?'日本':'米国'} ${research?'検証中':'厳選ルール'}</span><span class="${research?'badge C':'strict-badge'}">${research?'最終未確認':'最終試験合格'}</span></div><div class="rule-conditions">${esc((rule.labels||[]).join(' ＋ '))}</div><div class="rule-split"><div><div class="k">検証</div><div class="v">${num(v.win_rate,1)}% / n=${v.trades||0}</div></div><div><div class="k">最終試験</div><div class="v">${num(t.win_rate,1)}% / n=${t.trades||0}</div></div><div><div class="k">最終期待値</div><div class="v ${cls(t.expectancy)}">${pct(t.expectancy)}</div></div></div><div class="selective-stats"><span>PF ${num(t.profit_factor)}</span><span>中央値 ${pct(t.median_return)}</span><span>95%CI ${t.win_rate_ci_low??'—'}〜${t.win_rate_ci_high??'—'}%</span><span>検証+最終 ${num(h.win_rate,1)}%</span></div></div>`;
}

  await navigator.clipboard.writeText(out.join('\n'));toast('コピーしました');

    const map = new Map();
    for(const m of ['jp','us']) {
      for(const lane of state.momentum[m]?.board || []) {
        for(const r of lane.rows || []) map.set(String(r.symbol).toUpperCase(), {...(map.get(String(r.symbol).toUpperCase())||{}),...r});
      }
      const stocks = state.stage[m]?.stocks || {};
      if(Array.isArray(stocks)) {
        for(const r of stocks) {
          if(!r?.symbol) continue;
          const k=String(r.symbol).toUpperCase();
          map.set(k,{...(map.get(k)||{}),...r});
        }
      } else {
        for(const [sym,r] of Object.entries(stocks)) {
          const k=String(r?.symbol || sym).toUpperCase();
          map.set(k,{...(map.get(k)||{}),...(r||{})});
        }
      }
    }
    for(const w of state.watch?.items || []) {
      const k=String(w.symbol||'').toUpperCase();
      if(w.stage_data) map.set(k,{...(map.get(k)||{}),...w.stage_data});
    }
    for(const [sym,r] of Object.entries(state.watchQuotes || {})) map.set(sym,{...(map.get(sym)||{}),...r});
    return map;
  };

  window.loadWatch = async function(){
    $('watch-list').innerHTML = '<div class="loading">価格と判定を取得中…</div>';
    try {
      const [w,jp,us,p,sjp,sus] = await Promise.all([
        api('/api/watchlist'),
        api('/api/momentum?market=jp'),
        api('/api/momentum?market=us'),
        api('/api/positions').catch(()=>({positions:[]})),
        api('/api/stage?market=jp').catch(()=>state.stage.jp || {}),
        api('/api/stage?market=us').catch(()=>state.stage.us || {})
      ]);
      state.watch=w;state.momentum.jp=jp;state.momentum.us=us;state.positions=p;state.stage.jp=sjp;state.stage.us=sus;state.watchQuotes={};

      // 旧Workerでも価格が出るよう、価格欠落銘柄だけ個別照会する後方互換フォールバック。
      const bm=boardMap();
      const missing=(w.items||[]).filter(x=>!finite(bm.get(String(x.symbol).toUpperCase())?.price));
      const quotes=await mapLimit(missing,6,async x=>{
        try{
          const q=await api('/api/lookup?symbol='+encodeURIComponent(x.symbol));
          return finite(q?.price)?[String(x.symbol).toUpperCase(),{...q,symbol:x.symbol,quote_only:true}]:null;
        }catch{return null}
      });
      for(const q of quotes)if(q)state.watchQuotes[q[0]]=q[1];
      renderWatch();
    } catch(e) {
      $('watch-list').innerHTML='<div class="card pad down">'+esc(e.message)+'</div>';
    }
  };

  window.setWatchMarket = function(m){state.watchMarket=m;localStorage.setItem('vantage_watch_market',m);renderWatch()};
  const watchStatusLabel = v => v==='waiting'?'押し待ち':v==='skip'?'見送り':'追跡中';
  const watchDataState = r => {
    const price=finite(r?.price),analysis=!!(r?.entry_lane||r?.long_stage||r?.stage||r?.stage_code);
    if(price&&analysis)return{label:'価格・判定あり',kind:'ready'};
    if(price)return{label:'価格のみ',kind:'partial'};
    if(analysis)return{label:'判定のみ',kind:'partial'};
    return{label:'データ待ち',kind:'wait'};
  };
  const watchPriceText=(r,m)=>!finite(r?.price)?'価格待ち':m==='jp'?num(r.price,0)+'円':'$'+num(r.price,2);
  const watchTimeText=(r,w)=>{
    if(r?.quote_fetched_at)return'価格更新 '+dateText(r.quote_fetched_at);
    if(r?.quote_time)return'価格時点 '+dateText(Number(r.quote_time)*1000);
    if(w?.stage_refreshed_at)return'再判定 '+dateText(w.stage_refreshed_at);
    if(r?.bar_time)return'日足 '+dateText(Number(r.bar_time)*1000);
    return'更新時刻不明';
  };

  window.renderWatch = function(){
    if($('watch-sort'))$('watch-sort').value=state.watchSort;
    const all=sortWatch(state.watch?.items||[]),bm=boardMap();
    const jpCount=all.filter(w=>(w.market||marketOf(w.symbol))==='jp').length,usCount=all.length-jpCount;
    const items=all.filter(w=>(w.market||marketOf(w.symbol))===state.watchMarket);
    const enriched=items.map(w=>({w,r:bm.get(String(w.symbol).toUpperCase())||w.stage_data||{}}));
    const priority=enriched.filter(x=>['A','B'].includes(x.r.entry_lane)).length;
    const ready=enriched.filter(x=>finite(x.r.price)).length;
    const waiting=enriched.length-ready;
    const fresh=state.stage[state.watchMarket]?.price_time||state.stage[state.watchMarket]?.freshness||'市場データ';

    let html=`<div class="watch-market-bar"><div class="watch-market-switch"><button class="${state.watchMarket==='jp'?'active':''}" onclick="setWatchMarket('jp')">日本株 ${jpCount}</button><button class="${state.watchMarket==='us'?'active':''}" onclick="setWatchMarket('us')">米国株 ${usCount}</button></div><span class="fresh">${esc(fresh)}</span></div>`;
    html+=`<div class="watch-overview"><div class="watch-kpi priority"><div class="v">${priority}</div><div class="k">現在A・B</div></div><div class="watch-kpi"><div class="v">${ready}</div><div class="k">価格取得済み</div></div><div class="watch-kpi ${waiting?'wait':''}"><div class="v">${waiting}</div><div class="k">価格待ち</div></div></div>`;
    html+=`<details class="watch-guide"><summary>ウォッチの見方</summary><div class="guide-body"><b>追跡中／押し待ち／見送り</b>は自分で付ける管理状態です。A〜Eは現在の自動判定です。<br>閉じたカード右側の<b>更新</b>で、その銘柄だけ最新価格と日足判定を取り直します。保有☑とは別管理です。</div></details>`;
    if(!items.length){$('watch-list').innerHTML=html+'<div class="empty">この市場のウォッチは空です</div>';return}

    html+=enriched.map(({w,r})=>{
      const m=w.market||marketOf(w.symbol),lane=r.entry_lane||'D',laneLabel=r.entry_lane||'判定待ち',ds=watchDataState(r),status=w.status||'tracking';
      const chg=finite(r.change_pct)?pct(r.change_pct):'—',chgClass=finite(r.change_pct)?cls(r.change_pct):'muted';
      const stageText=r.long_stage||r.stage||r.stage_code||'日足レジーム待ち';
      const setup=r.setup_label?`<span>${esc(r.setup_label)}</span>`:'';
      return `<details class="compact-row"><summary class="compact-head"><span class="name grow1">${esc(w.name)}</span><span class="code">${esc(code(w.symbol))}</span><span class="badge ${lane}">${esc(laneLabel)}</span><span class="watch-status ${status}">${watchStatusLabel(status)}</span>${w.held?'<span class="badge held">保有</span>':''}<span class="watch-quote"><b>${watchPriceText(r,m)}</b><span class="${chgClass}">${chg}</span></span><button class="watch-inline-update" onclick="event.preventDefault();event.stopPropagation();refreshWatch('${attr(w.id)}',this)">更新</button></summary>`+
        `<div class="watch-detail"><div class="meta"><span class="watch-data-state ${ds.kind}">${ds.label}</span><span>${esc(stageText)}</span>${setup}<span>${esc(watchTimeText(r,w))}</span></div><div class="watch-refresh-note">${w.stage_refresh_note?esc(w.stage_refresh_note):'価格は現在値または最新終値。判定は最新取得日足を使用。'}</div>`+
        `<div class="formgrid"><select id="ws-${attr(w.id)}"><option value="tracking" ${status==='tracking'?'selected':''}>追跡中</option><option value="waiting" ${status==='waiting'?'selected':''}>押し待ち</option><option value="skip" ${status==='skip'?'selected':''}>見送り</option></select><textarea id="wm-${attr(w.id)}" placeholder="条件・押し目水準・決算前後の方針">${esc(w.memo||'')}</textarea></div>`+
        `<div class="actions"><button onclick="saveWatch('${attr(w.id)}')">保存</button><button onclick="openChart('${attr(w.symbol)}')">チャート</button><button onclick="toggleHeld('${attr(w.symbol)}','${attr(w.name)}','${m}')">${w.held?'保有解除':'保有☑'}</button><button class="primary" onclick="refreshWatch('${attr(w.id)}',this)">価格・判定を更新</button><button class="danger" onclick="deleteWatch('${attr(w.id)}')">削除</button></div></div></details>`;
    }).join('');
    $('watch-list').innerHTML=html;
  };

  window.refreshWatch = async function(id,btn){
    const original=btn?.textContent||'価格・判定を更新';
    if(btn){btn.disabled=true;btn.classList.add('refreshing');btn.textContent='取得中…'}
    try{
      const d=await api('/api/watchlist',{method:'POST',body:{action:'refresh_stage',id}});
      if(d?.ok===false)throw new Error(d.error||'更新できませんでした');
      await loadWatch();
      const w=(state.watch?.items||[]).find(x=>String(x.id)===String(id));
      const r=w?(boardMap().get(String(w.symbol).toUpperCase())||w.stage_data||{}):{};
      toast(finite(r.price)?`更新完了 ${watchPriceText(r,w.market||marketOf(w.symbol))} / ${r.entry_lane||'判定待ち'}`:'判定は更新しましたが価格取得待ちです');
    }catch(e){toast('更新失敗: '+e.message);if(btn){btn.disabled=false;btn.classList.remove('refreshing');btn.textContent=original}}
  };

  window.setSignalMarket=function(m){state.signalMarket=m;localStorage.setItem('vantage_signal_market',m);renderSignals()};
  const signalMarketOf=x=>x.market||marketOf(x.symbol);
  const phaseOf=x=>x.phase||(x.active?'active':finite(x.outcomes?.d5?.return_pct)?'complete':'tracking');
  const phaseLabel=x=>phaseOf(x)==='active'?'今日のA/B候補':phaseOf(x)==='complete'?'5日結果確定':'過去シグナル・5日観測中';
  const phaseKind=x=>phaseOf(x)==='active'?'live':phaseOf(x)==='complete'?'done':'wait';
  const horizonStat=(items,lane,h='d5')=>{
    const vals=items.filter(x=>x.entry_lane===lane).map(x=>x.outcomes?.[h]?.return_pct).filter(finite).map(Number).sort((a,b)=>a-b);
    if(!vals.length)return{n:0,median:null,win_rate:null};const mid=Math.floor(vals.length/2),median=vals.length%2?vals[mid]:(vals[mid-1]+vals[mid])/2;
    return{n:vals.length,median,win_rate:Math.round(vals.filter(v=>v>0).length/vals.length*100)};
  };
  const signalKpi=(label,s)=>{const ready=s.n>0,kind=ready?(s.median>0?'good':''):'wait';return`<div class="signal-kpi ${kind}"><div class="v">${ready?pct(s.median):'—'}</div><div class="k">${label}・5日中央値</div><div class="sub">${ready?'勝率 '+s.win_rate+'% ・ 確定'+s.n+'件':'5日結果なし・蓄積中'}</div></div>`};
  const signalSectionNew=(title,items)=>{let h=`<div class="section-title">${title} ${items.length}件</div>`;return h+(items.length?items.map(signalCardNew).join(''):'<div class="empty">該当なし</div>')};

  const signalCardNew=x=>{
    const o=x.outcomes||{},keys=['d1','d3','d5'],days=observedDays(x),lane=x.entry_lane||'D',remaining=Math.max(0,Number(x.remaining_to_d5??(5-days)));
    const outcomes=keys.filter(k=>finite(o[k]?.return_pct)).map(k=>`<span class="outcome ${cls(o[k].return_pct)}">${k.replace('d','')}営業日後 ${pct(o[k].return_pct)}</span>`).join('');
    const watched=watchSet().has(String(x.symbol).toUpperCase()),phase=phaseLabel(x),kind=phaseKind(x);
    const baseline=finite(x.start_price)?(signalMarketOf(x)==='jp'?num(x.start_price,0)+'円':'$'+num(x.start_price,2)):'—';
    const glance=(k,label)=>finite(o[k]?.return_pct)?`<span class="signal-glance ${cls(o[k].return_pct)}"><b>${label}</b>${pct(o[k].return_pct)}</span>`:`<span class="signal-glance wait"><b>${label}</b>待ち</span>`;
    const current=days>0&&finite(x.current_return)?`<span class="signal-glance ${cls(x.current_return)}"><b>現在</b>${pct(x.current_return)}</span>`:'';
    return `<details class="compact-row signal-card ${kind}"><summary class="signal-card-summary"><div class="signal-card-top"><span class="name grow1">${esc(x.name)}</span><span class="code">${esc(code(x.symbol))}</span><span class="badge ${lane}">${esc(lane)}</span><span class="signal-progress ${kind}">${phase}</span></div>`+
      `<div class="signal-card-glance"><span class="signal-glance"><b>開始</b>${esc(x.start_date||'—')}</span><span class="signal-glance"><b>観測</b>${days}/5</span><span class="signal-glance ${remaining?'wait':'up'}"><b>残り</b>${remaining}日</span>${current}${glance('d1','1日')}${glance('d3','3日')}${glance('d5','5日')}</div></summary>`+
      `<div class="signal-detail"><div class="meta"><span>${signalMarketOf(x)==='jp'?'日本株':'米国株'}</span><span class="signal-progress ${kind}">${phase}</span><span>開始 ${x.start_date}</span><span>観測 ${days}営業日目</span><span>確定まで ${remaining}営業日</span>${x.condition_end_date?`<span>条件終了 ${x.condition_end_date}</span>`:''}<span>MFE ${finite(x.mfe)?pct(x.mfe):'—'}</span><span>MAE ${finite(x.mae)?pct(x.mae):'—'}</span></div>`+
      `<div class="signal-baseline">基準：検出日の終値 ${baseline}。増減率はこの価格との比較です。</div><div class="outcomes">${outcomes||`<span class="outcome wait">翌営業日の終値待ち</span>`}</div>`+
      `${phaseOf(x)==='tracking'?'<div class="note">「条件終了」はA/B判定から外れたという意味です。売却・失敗の意味ではなく、5営業日後まで結果を追跡します。</div>':''}`+
      block('検出理由',x.reason)+block('相対評価',x.relative_text)+block('注意点',x.risk_reason)+
      `<div class="actions">${watched?'<button disabled>観察中</button>':`<button class="primary" onclick="signalToWatch('${attr(x.symbol)}','${attr(x.name)}','${signalMarketOf(x)}','${attr(x.reason||'')}')">ウォッチへ</button>`}<button onclick="openChart('${attr(x.symbol)}')">チャート</button><button class="danger" onclick="deleteSignal('${attr(x.id)}')">削除</button></div></div></details>`;
  };

  window.loadSignals=async function(){
    $('signal-list').innerHTML='<div class="loading">検証履歴を取得中…</div>';
    try{
      state.signals=await api('/api/signal-log?limit=300');
      if(typeof ensureWatch==='function')await ensureWatch();
      renderSignals();
    }catch(e){$('signal-list').innerHTML='<div class="card pad down">'+esc(e.message)+'</div>'}
  };

  window.refreshSignalValidation=async function(btn){
    const old=btn?.textContent||'検証を更新';if(btn){btn.disabled=true;btn.textContent='更新中…'}
    try{await api('/api/signal-log-capture?market='+state.signalMarket,{write:true});await loadSignals();toast('最新の確定データで検証を更新しました')}catch(e){toast('更新失敗: '+e.message)}finally{if(btn&&document.body.contains(btn)){btn.disabled=false;btn.textContent=old}}
  };

  window.renderSignals=function(){
    const d=state.signals||{},all=d.items||[],m=state.signalMarket,items=all.filter(x=>signalMarketOf(x)===m);
    const active=items.filter(x=>phaseOf(x)==='active'),tracking=items.filter(x=>phaseOf(x)==='tracking'),complete=items.filter(x=>phaseOf(x)==='complete');
    const a=horizonStat(items,'A'),b=horizonStat(items,'B'),completed=items.filter(x=>finite(x.outcomes?.d5?.return_pct)).length;
    const jpCount=all.filter(x=>signalMarketOf(x)==='jp').length,usCount=all.length-jpCount;
    let html=`<div class="watch-market-bar"><div class="watch-market-switch"><button class="${m==='jp'?'active':''}" onclick="setSignalMarket('jp')">日本株 ${jpCount}</button><button class="${m==='us'?'active':''}" onclick="setSignalMarket('us')">米国株 ${usCount}</button></div><button class="small" onclick="refreshSignalValidation(this)">検証を更新</button></div>`;
    html+=`<details class="signal-guide"><summary>シグナル検証の見方</summary><div class="guide-body"><b>今日のA/B候補</b>＝最新の確定終値で候補条件に該当。<b>過去シグナル・5日観測中</b>＝A/Bから外れた後も5営業日まで追跡中。<b>5日結果確定</b>＝検出日の終値から5営業日後まで測定済み。<br>当日は基準価格と同じなので、誤解を避けて0.0%ではなく「翌営業日の終値待ち」と表示します。自動更新は各市場の引け後です。</div></details>`;
    html+=`<div class="signal-hero"><div class="signal-hero-head"><div class="grow1"><div class="signal-hero-title">${m==='jp'?'日本株':'米国株'}シグナルの再現性</div><div class="signal-hero-sub">検出日の終値を基準に、1・3・5営業日後の終値を比較します。5日確定30件までは参考値です。</div></div><span class="badge ${completed>=30?'A':'C'}">${completed>=30?'評価可能':'蓄積中'}</span></div><div class="signal-hero-grid">${signalKpi('A',a)}${signalKpi('B',b)}<div class="signal-kpi ${completed<30?'wait':''}"><div class="v">${completed}</div><div class="k">5日確定件数</div><div class="sub">${completed>=30?'判断母数を確保':'目安30件まであと'+Math.max(0,30-completed)+'件'}</div></div></div></div>`;
    html+=signalSectionNew('今日のA/B候補',active)+signalSectionNew('過去シグナル・5日観測中',tracking)+signalSectionNew('5日結果確定',complete);
    $('signal-list').innerHTML=html;
  };

if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js?v=full-replacement-v35-ui1').then(r=>r.update()).catch(()=>{}));
loadStage();
</script>

</body>
</html>

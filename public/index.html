/* ===== refined interface ===== */
:root{
 --bg:#f1f3f6;--surface:#ffffff;--surface2:#f7f8fa;--surface3:#eef1f5;
 --line:#e2e6ec;--lineStrong:#cfd5de;--text:#161c27;--muted:#596474;--faint:#8992a0;
 --blue:#3267d6;--blueBg:#e9f0ff;--green:#167a54;--greenBg:#e8f5ef;

 --purple:#7651c7;--purpleBg:#f0ebff;--r:12px;--rLg:18px;
 --shadow:0 1px 2px rgba(18,27,44,.04),0 8px 24px rgba(18,27,44,.055);
 --shadowLg:0 18px 50px rgba(18,27,44,.16)
}
body{
 font-family:"Inter","Noto Sans JP","SF Pro Text","Segoe UI Variable","Segoe UI",sans-serif;
 background:radial-gradient(900px 430px at 88% -8%,rgba(50,103,214,.08),transparent 58%),linear-gradient(180deg,#f5f6f8 0%,var(--bg) 44%);
 font-weight:500;letter-spacing:-.012em;padding-top:16px
}

 return `<div class="explorer-card ${add?'add':''}"><div class="explorer-card-head"><input class="explorer-check" type="checkbox" data-symbol="${attr(x.symbol)}" data-name="${attr(x.name)}" ${add?'checked':''}><span class="badge ${add?'A':'C'}">${add?'追加候補':'観察候補'}</span><span class="name grow1">${esc(x.name)}</span><span class="code">${esc(code(x.symbol))}</span><span class="rank-move">${esc(move)}</span><span class="explorer-score">${x.score}</span></div>${quoteHtml(x,'jp')}<div class="meta">${marginBadgeHtml(x)}<span>${esc(x.type)}</span><span>売買代金 ${x.rank}位</span><span>${esc(x.theme||'その他')}</span></div><div class="explorer-metrics"><div class="explorer-metric"><b>${num(x.vol_ratio)}x</b>出来高</div><div class="explorer-metric"><b>${pct(x.rs5)}</b>5日市場RS</div><div class="explorer-metric"><b>${pct(x.div25)}</b>25MA乖離</div><div class="explorer-metric"><b>${pct(x.ret20)}</b>20日</div><div class="explorer-metric"><b>${esc(x.stage_code||'—')}</b>日足レジーム</div><div class="explorer-metric"><b>${x.rsi??'—'}</b>RSI</div></div><div class="explorer-reasons">${(x.reasons||[]).map(r=>`<span class="reason-chip">${esc(r)}</span>`).join('')}${(x.cautions||[]).map(r=>`<span class="caution-chip">${esc(r)}</span>`).join('')}</div><div class="actions"><button onclick="openChart('${attr(x.symbol)}')">チャート</button><button class="primary" onclick="addExplorerOne('${attr(x.symbol)}','${attr(x.name)}')">レーダーへ追加</button></div></div>`;

function renderExplorer(d){
 let html=`<div class="explorer-hero"><div class="explorer-head"><div class="grow1"><div class="explorer-title">日本株・探索候補</div><div class="explorer-sub">売買代金上位300を裏側で確認し、未登録銘柄を順位変化・出来高・市場RS・日足レジーム・25MA位置で分析します。追加は自動実行せず、選択した銘柄だけ承認します。</div></div><button class="small" onclick="loadExplorer(true)">市場データを再取得</button></div><div class="explorer-stats"><div class="explorer-stat"><div class="v">${d.registered_count||0}/160</div><div class="k">日本株登録</div></div><div class="explorer-stat"><div class="v">${d.radar_count||0}</div><div class="k">レーダー</div></div><div class="explorer-stat"><div class="v">${d.add_count||0}</div><div class="k">追加候補</div></div><div class="explorer-stat"><div class="v">${d.history_days||0}日</div><div class="k">順位履歴</div></div></div></div>`;
 html+=`<div class="toolbar"><button class="primary" onclick="addSelectedExplorer()">選択をまとめて追加</button><span class="muted">空き ${d.remaining_slots??0}枠</span></div>`;
 if(!(d.items||[]).length)html+='<div class="discovery-empty">現在は追加・観察基準を満たす未登録銘柄がありません。順位履歴が増えるほど変化を捉えやすくなります。</div>';
 else html+='<div class="explorer-grid">'+d.items.map(explorerCard).join('')+'</div>';
 if((d.skipped||[]).length)html+=`<details class="card"><summary class="row"><span class="name grow1">見送り上位</span><span class="count">${d.skipped.length}件</span></summary><div class="pad">${d.skipped.map(x=>`<div class="row"><span class="code">${esc(code(x.symbol))}</span><span class="name grow1">${esc(x.name)}</span><span>${x.score}点</span><span class="muted">${esc((x.cautions||[]).join('・')||'条件不足')}</span></div>`).join('')}</div></details>`;
 html+=`<div class="note">基準日 ${esc(d.ranking_trade_date||'—')} / 生成 ${dateText(d.generated_at)}。最初は順位変化の履歴が少ないため、上位順位と日足指標の比重が高くなります。翌営業日からNEW・順位上昇の判定精度が上がります。</div>`;
 $('stage-discover').innerHTML=html;
}

function sortWatch(items){
 const bm=boardMap(),rank={A:0,B:1,C:2,D:3,E:4};
 return items.slice().sort((a,b)=>{
  if(state.watchSort==='added')return new Date(b.added_at||0)-new Date(a.added_at||0);
  if(state.watchSort==='market'){const d=String(a.market).localeCompare(String(b.market));if(d)return d}
  const ar=rank[bm.get(String(a.symbol).toUpperCase())?.entry_lane]??9,br=rank[bm.get(String(b.symbol).toUpperCase())?.entry_lane]??9;
  return ar-br||String(a.name).localeCompare(String(b.name),'ja');
 });
}

function btVerdict(m,recent){
 const n=m?.trades||0;if(n<30)return{label:'蓄積中',kind:''};
 if((m.expectancy??0)<=0||(m.profit_factor??0)<1)return{label:'優位性なし',kind:'bad'};
 if((recent?.trades||0)>=10&&(recent.expectancy??0)<0)return{label:'直近弱化',kind:'warn'};
 if((m.expectancy??0)>=.5&&(m.profit_factor??0)>=1.4&&(m.median_return??-99)>0)return{label:'条件分解候補',kind:'warn'};
 return{label:'弱い優位性',kind:''};
}
function btMetric(v,label,format='pct'){
 const text=v==null?'—':format==='pct'?pct(v):format==='num'?num(v):String(v);
 return `<div class="bt-metric"><div class="v">${text}</div><div class="k">${label}</div></div>`;
}
function ruleCard(rule,research=false){
 const v=rule.validation||{},t=rule.test||{},h=rule.holdout||{};
 return `<div class="rule-card"><div class="rule-head"><span class="badge ${rule.strategy==='A'||rule.strategy==='C_A'?'A':'B'}">${rule.strategy.replace('_','→')}</span><span class="rule-name">${rule.market==='jp'?'日本':'米国'} ${research?'検証中':'厳選ルール'}</span><span class="${research?'badge C':'strict-badge'}">${research?'最終未確認':'最終試験合格'}</span></div><div class="rule-conditions">${esc((rule.labels||[]).join(' ＋ '))}</div><div class="rule-split"><div><div class="k">検証</div><div class="v">${num(v.win_rate,1)}% / n=${v.trades||0}</div></div><div><div class="k">最終試験</div><div class="v">${num(t.win_rate,1)}% / n=${t.trades||0}</div></div><div><div class="k">最終期待値</div><div class="v ${cls(t.expectancy)}">${pct(t.expectancy)}</div></div></div><div class="selective-stats"><span>PF ${num(t.profit_factor)}</span><span>中央値 ${pct(t.median_return)}</span><span>95%CI ${t.win_rate_ci_low??'—'}〜${t.win_rate_ci_high??'—'}%</span><span>検証+最終 ${num(h.win_rate,1)}%</span></div></div>`;
}
function btErrorLabel(k){return({rate_limit:'Yahoo制限',provider_access:'取得元拒否',not_found:'銘柄・データなし',network:'通信失敗',symbol_mismatch:'銘柄不一致',history_short:'履歴不足',worker_limit:'Worker制限',analysis:'分析エラー'})[k]||k}
function renderBacktest(){
 const d=state.backtest||{},p=d.progress||{},total=p.total||0,success=p.success??Math.max(0,(p.done||0)-(p.failed??p.errors??0)),failed=p.failed??p.errors??0,retrying=p.retrying||0,pending=p.pending??Math.max(0,total-success-failed-retrying),resolved=success+failed,rate=total?Math.min(100,resolved/total*100):0;
 const statusMap={complete:'完了',failed:'集計失敗',running:'自動集計中'},status=statusMap[d.status]||'自動集計中',usable=d.result_usable===true;
 const btButton=d.status==='complete'?'<button class="small" disabled>再集計待機中</button>':d.status==='failed'?'<button class="small primary" onclick="restartBacktest(this)">最初から再集計</button>':'<button class="small" onclick="advanceBacktest(this)">5銘柄進める</button>';
 let html=`<div class="bt-hero ${d.status==='failed'?'bt-failed':''}"><div class="bt-head"><div class="grow1"><div class="bt-title">登録銘柄バックテスト</div><div class="bt-sub">各銘柄を最大3回まで再試行し、成功率90%以上の場合だけ検証結果と厳選条件を有効にします。不完全な母集団を「完了」と扱いません。</div></div><span class="badge ${usable?'A':d.status==='failed'?'E':'C'}">${status}</span></div><div class="bt-progress"><span style="width:${rate.toFixed(1)}%"></span></div><div class="bt-progress-meta"><span>成功 ${success} / 失敗 ${failed} / 全${total}</span><span>再試行 ${retrying}・未処理 ${pending}</span></div><div class="actions">${btButton}</div></div>`;
 if(d.using_previous_complete)html+='<div class="note">新しい再集計中のため、成績欄は前回の有効な完了分を表示しています。</div>';
 const integrity=d.integrity||{};
 if(d.status==='failed'||(d.status==='complete'&&!usable))html+=`<div class="bt-integrity-alert"><b>この結果は売買判断に使用しません</b><span>${esc(integrity.reason||'成功率が基準未満です')}。厳選条件の固定も停止しています。</span></div>`;
 else if(d.status==='running')html+=`<div class="bt-integrity-note"><b>再集計中</b><span>成功率判定は全銘柄の取得・再試行後に確定します。</span></div>`;
 const categories=d.error_categories||{},attemptCats=d.attempt_error_categories||{},catKeys=[...new Set([...Object.keys(categories),...Object.keys(attemptCats)])];
 const recent=(d.failures?.length?d.failures:d.recent_errors||[]).slice(-12);
 if(catKeys.length||recent.length){html+=`<details class="card bt-errors" ${d.status==='failed'?'open':''}><summary class="row"><div class="name grow1">取得・分析エラー</div><span class="count">最終失敗 ${failed}件</span></summary><div class="pad"><div class="bt-error-cats">${catKeys.map(k=>`<span>${esc(btErrorLabel(k))} <b>${categories[k]||0}</b><small>試行${attemptCats[k]||categories[k]||0}</small></span>`).join('')}</div>${recent.length?`<div class="bt-error-list">${recent.map(x=>`<div><span class="code">${esc(x.symbol||'—')}</span><b>${esc(btErrorLabel(x.category))}</b><small>${esc(x.error||'')}</small><em>${x.attempt||1}回目</em></div>`).join('')}</div>`:''}</div></details>`}
 const sel=d.selective||{},confirmed=sel.confirmed||[],research=sel.research||[];
 html+='<div class="section-title">厳選条件（未使用期間60%以上）</div>';
 if(!usable)html+=`<div class="card pad muted">${d.status==='failed'?'成功率不足のため厳選条件を作成・固定しません。再集計後に判定します。':'全登録銘柄の再集計完了後に条件を確定します。途中値から厳選ルールは作りません。'}</div>`;
 else if(!confirmed.length)html+='<div class="card pad">勝率60%だけでなく、最終試験の期待値・PF・中央値・サンプル数まで満たす条件はありませんでした。候補を無理に表示しません。</div>';
 else html+='<div class="rule-grid">'+confirmed.map(r=>ruleCard(r,false)).join('')+'</div>';
 if(usable&&research.length)html+=`<details class="card"><summary class="row"><div class="name grow1">検証中の条件</div><span class="count">${research.length}件</span></summary><div class="pad"><div class="rule-grid">${research.map(r=>ruleCard(r,true)).join('')}</div></div></details>`;
 html+='<div class="section-title">基礎ルール別の成績</div>'+(usable||d.using_previous_complete?'':'<div class="note">集計が有効になるまで以下の数値は参考表示です。</div>')+'<div class="bt-grid">';
 for(const key of ['A','B','C_A','C_B']){
  const x=d.strategies?.[key]||{},all=x.metrics||{},m=x.market_metrics?.jp||all,r=x.market_recent_metrics?.jp||x.recent_metrics||{},us=x.market_metrics?.us||{},v=usable||d.using_previous_complete?btVerdict(m,r):{label:'判定保留',kind:'warn'};
  html+=`<div class="bt-card"><div class="bt-card-head"><span class="badge ${key==='A'||key==='C_A'?'A':'B'}">${key.replace('_','→')}</span><span class="bt-card-title">日本 ${esc(x.label||key)}</span><span class="bt-verdict ${v.kind}">${v.label}</span></div><div class="bt-main">${btMetric(m.win_rate,'勝率')}${btMetric(m.expectancy,'期待値')}${btMetric(m.profit_factor,'PF','num')}</div><div class="bt-detail"><span>日本取引 n=${m.trades||0}</span><span>シグナル ${m.signals||0}</span><span>トリガー率 ${pct(m.trigger_rate)}</span><span>中央値 ${pct(m.median_return)}</span><span>平均利益 ${pct(m.avg_win)}</span><span>平均損失 ${pct(m.avg_loss)}</span><span>MAE中央値 ${pct(m.mae_median)}</span><span>MFE中央値 ${pct(m.mfe_median)}</span><span>直近1年 ${pct(r.expectancy)}</span></div>${(us.trades||0)?`<details><summary class="muted">海外リード参考：勝率 ${pct(us.win_rate)} / 期待値 ${pct(us.expectancy)} / PF ${num(us.profit_factor)} / n=${us.trades}</summary></details>`:''}</div>`;
 }
 html+='</div>';
 const assumptions=d.assumptions||{};
 html+=`<div class="section-title">検証モデル</div><div class="card pad bt-model"><b>エントリー</b> ${esc(assumptions.entry||'—')}<br><b>見送り</b> シグナル終値から+${assumptions.gap_skip_pct??3}%超のギャップ<br><b>損切り</b> ${esc(assumptions.stop||'—')}<br><b>EXIT</b> ${esc(assumptions.exit||'—')}<br><b>同日順序不明</b> ${esc(assumptions.same_day_ambiguous||'—')}<br><b>コスト</b> 往復${assumptions.round_trip_cost_pct??.15}%控除<br><b>再試行</b> 最大${assumptions.max_retries??3}回 / <b>必要成功率</b> ${assumptions.min_success_rate??90}%</div>`;
 const rows=(d.symbols||[]).filter(x=>(x.trades||0)>=5).sort((a,b)=>(b.expectancy??-99)-(a.expectancy??-99)).slice(0,15);
 html+=`<details class="card"><summary class="row"><div class="name grow1">銘柄別・期待値上位</div><span class="count">${rows.length}件</span></summary>${rows.length?rows.map(x=>`<div class="bt-symbol" onclick="openBacktestSymbol('${x.market}','${attr(x.symbol)}')"><div><span class="name">${esc(x.name)}</span> <span class="code">${esc(code(x.symbol))}</span></div><span class="badge ${x.strategy==='A'||x.strategy==='C_A'?'A':'B'}">${x.strategy.replace('_','→')}</span><span class="bt-exp ${cls(x.expectancy)}">${pct(x.expectancy)}</span><span class="bt-n">n=${x.trades}</span></div>`).join(''):'<div class="empty">1銘柄5取引以上で表示</div>'}</details>`;
 html+='<div class="note">厳選条件は勝率だけを逆算しません。取得成功率90%以上を満たした母集団だけで、学習・検証・最終試験を時系列分離します。現在登録銘柄による参考検証のため、サバイバーシップ・バイアスは残ります。注文は送信しません。</div>';
 $('backtest-list').innerHTML=html;
}
async function advanceBacktest(btn){
 const old=btn.textContent;btn.disabled=true;btn.textContent='更新中…';
 try{const d=await api('/api/backtest-run?count=5',{write:true});toast(d.skipped?'現在の状態を維持しています':`${d.processed||0}回処理・成功${d.progress?.success||0}・再試行${d.progress?.retrying||0}`);state.backtest=null;await loadBacktest()}catch(e){toast(e.message)}finally{btn.disabled=false;btn.textContent=old}

async function restartBacktest(btn){
 if(!confirm('現在のバックテスト集計を破棄し、全銘柄を最初から再集計しますか？'))return;
 const old=btn.textContent;btn.disabled=true;btn.textContent='初期化中…';
 try{const d=await api('/api/backtest-run?count=5&force=1',{write:true});toast(`再集計を開始しました・${d.processed||0}回処理`);state.backtest=null;await loadBacktest()}catch(e){toast(e.message)}finally{btn.disabled=false;btn.textContent=old}

async function openBacktestSymbol(market,symbol){

  const d=await api('/api/backtest-symbol?market='+market+'&symbol='+encodeURIComponent(symbol));if(!d.ok)throw new Error(d.error||'未集計');
  const r=d.result;$('modal-title').textContent=(r.name||r.symbol)+' '+code(r.symbol);

  for(const key of ['A','B','C_A','C_B']){
   const x=r.strategies?.[key];if(!x)continue;const m=x.metrics||{},tr=(x.trades||[]).filter(t=>t.status==='trade').slice(-8).reverse();

  }

function renderEvents(){
 const now=Date.now(),events=(state.events?.events||[]).slice().sort((a,b)=>new Date(a.time)-new Date(b.time));

async function loadMarginSupply(force=false){
  const root=$('margin-list');if(!root)return;root.innerHTML='<div class="loading">公式信用需給データを確認中…</div>';
  try{
    // Always fetch the current JP stage after the margin dataset.
    // Reusing state.stage.jp here left the dashboard permanently stale.
    const d=force
      ?await api('/api/margin-supply?refresh=1',{write:true})
      :await api('/api/margin-supply');
    const st=await api('/api/stage?market=jp');
    state.margin=d;state.stage.jp=st;

    const rows=Object.values(st.stocks||{}).filter(x=>x.market==='jp');
    const available=rows.filter(x=>x.margin_supply?.available);
    const covered=available.length;
    const warn=available
      .filter(x=>Number(x.supply_score)<=-7||x.margin_add_blocked)
      .sort((a,b)=>(a.supply_score??0)-(b.supply_score??0));
    const good=available
      .filter(x=>Number(x.supply_score)>=4)
      .sort((a,b)=>(b.supply_score??0)-(a.supply_score??0));
    const neutral=available
      .filter(x=>Number(x.supply_score)>-7&&Number(x.supply_score)<4&&!x.margin_add_blocked)
      .sort((a,b)=>Math.abs(Number(b.supply_score||0))-Math.abs(Number(a.supply_score||0)));

    let html=`<div class="margin-hero"><h2>日本株・信用需給</h2><p>JPXの週次信用残と、日々公表・特別周知・信用規制を統合。価格・市場差RS・出来高の主判定は変えず、候補順位とポジション注意へ補助的に反映します。</p><div class="margin-kpis"><div class="margin-kpi"><b>${esc(d.weekly?.as_of||'待ち')}</b><span>週次基準日</span></div><div class="margin-kpi"><b>${d.weekly?.count||0}</b><span>公式収録銘柄</span></div><div class="margin-kpi"><b>${covered}/${rows.length}</b><span>登録銘柄カバー</span></div><div class="margin-kpi"><b>${warn.length}</b><span>需給悪化・警戒</span></div></div></div>`;
    html+=`<div class="toolbar"><button class="primary small" onclick="loadMarginSupply(true)">公式データを再同期</button><span class="fresh">生成 ${dateText(d.generated_at)}</span></div>`;
    if(d.cache_warning)html+=`<div class="note down">最新ファイルの取得に失敗したため保存済みデータを表示：${esc(d.cache_warning)}</div>`;
    if(!d.weekly?.count)html+='<div class="note">初回の「Update JP Margin Supply Data」GitHub Actions完了後に、全銘柄の週次残高が表示されます。</div>';
    if(d.weekly?.count&&rows.length&&covered===0)html+='<div class="note down"><b>反映エラー：</b>公式データは取得済みですが、登録銘柄への信用需給付与が0件です。画面を再読込しても直らない場合はバックエンドの状態を確認してください。</div>';
    if(rows.length&&covered<rows.length)html+=`<div class="note">信用需給を取得できた登録銘柄 ${covered}件 / データ待ち ${rows.length-covered}件</div>`;
    html+='<div class="note"><b>重要：</b>日々公表銘柄は注意喚起で、増担保などの信用規制そのものではありません。残高は週次なので、必ず基準日を確認します。</div>';

    const cards=(title,list,empty,limit=20)=>`<div class="section-title">${title}</div>${list.length?list.slice(0,limit).map(r=>`<div class="compact-row" onclick="openCandidate('${attr(r.symbol)}')"><div class="compact-head"><span class="code">${esc(code(r.symbol))}</span><span class="name grow1">${esc(r.name)}</span>${marginBadgeHtml(r)}</div>${marginSupplyHtml(r)}</div>`).join(''):`<div class="empty">${empty}</div>`}`;
    const noCoverage=d.weekly?.count&&rows.length&&covered===0;
    html+=cards('登録銘柄・需給悪化／警戒',warn,noCoverage?'登録銘柄への反映なし':'現在は該当なし');
    html+=cards('登録銘柄・需給改善／追い風',good,noCoverage?'登録銘柄への反映なし':'現在は該当なし');
    html+=cards('登録銘柄・中立',neutral,noCoverage?'登録銘柄への反映なし':'中立銘柄なし',30);

    const flagged=d.flagged||[];
    html+=`<div class="section-title">市場全体の注意・規制銘柄</div><div class="card">${flagged.length?flagged.slice(0,40).map(x=>{const f=x.flags||{},tags=[f.daily_disclosure?'日々公表':null,f.special_notice?'特別周知':null,f.margin_restriction?'信用規制':null].filter(Boolean);return `<div class="flag-row"><span class="code">${esc(code(x.symbol))}</span><span class="name">${esc(x.name||x.symbol)}</span><span class="flag-tags">${tags.map(t=>`<span>${esc(t)}</span>`).join('')}</span></div>`}).join(''):'<div class="empty">該当なし</div>'}</div>`;
    html+=`<div class="note">週次残高：JPX「銘柄別信用取引週末残高」／注意・規制：JPXの日々公表・特別周知・信用取引規制ページ。発注前の最終確認は証券会社画面を使用してください。</div>`;
    root.innerHTML=html;
    if(force)toast(`信用需給を再同期しました（登録 ${covered}/${rows.length}）`);
  }catch(e){root.innerHTML='<div class="card pad down">'+esc(e.message)+'</div>'}
}

function universeModeLabel(mode){return mode==='guarded_auto'?'週次・安全自動':mode==='proposal'?'提案のみ':'停止'}

function universeMarketBlock(label,p){
 if(!p)return `<div class="card pad"><b>${label}</b><div class="note">提案をまだ作成していません。</div></div>`;
 const pairs=Math.max(p.adds?.length||0,p.drops?.length||0),rows=[];
 for(let i=0;i<pairs;i++){
  const a=p.adds?.[i],d=p.drops?.find(x=>x.symbol===a?.replacement)||p.drops?.[i];

window.themeCard=function(group){
 const p=group.phase,leaders=[...group.rows].sort((a,b)=>(Number(b.rs5)||-99)-(Number(a.rs5)||-99)).slice(0,8),open=['GERMINATION','RECOVERY','EXPANSION'].includes(p.code);
 themeSeq+=1;
 const regional=`<div class="region-line"><span>伝播 <b>${esc(p.propagation)}</b></span><span>範囲 <b>${esc(p.coverage)}</b></span>${p.jp?`<span>JP ${p.jp.n}銘柄 / 市場差5日 ${pct(p.jp.rs5)}</span>`:''}${p.us?`<span>US ${p.us.n}銘柄 / 市場差5日 ${pct(p.us.rs5)}</span>`:''}</div>`;
 const confidence=`<div class="confidence-row"><span class="confidence-pill ${confidenceClass(p.confidence)}">分析確度 ${num(p.confidence,0)}%</span><span>JP確度 ${num(p.jp_confidence,0)}%</span><span>US確度 ${num(p.us_confidence,0)}%</span></div>`;
 return `<details class="theme-card v52-theme-card ${p.kind}" ${open?'open':''}><summary><div class="theme-card-head"><div class="grow1"><div class="theme-title">${esc(group.name)}</div><div class="theme-reason">${esc(p.reason)}</div></div>${phaseBadge(p)}</div><div class="theme-kpis"><span>市場差RS5 <b class="${cls(p.rs5)}">${pct(p.rs5)}</b></span><span>市場差RS20 <b class="${cls(p.rs20)}">${pct(p.rs20)}</b></span><span>A/B <b>${p.a+p.b}/${p.n}</b></span><span>広がり <b>${num(p.breadth,0)}%</b></span></div>${regional}${confidence}${themeHistoryLine(group)}</summary><div class="theme-detail"><div class="theme-detail-grid"><div><b>${num(p.vol)}x</b><span>平均出来高比</span></div><div><b>${p.c}</b><span>押し目監視</span></div><div><b>${p.e}</b><span>警戒</span></div><div><b>${num(p.improving,0)}%</b><span>市場差RS改善率</span></div></div><div class="section-title">先導銘柄 · 行を押すとその場で詳細</div>${leaders.map((r,i)=>inlineThemeLeader(r,group.name,i)).join('')}<div class="note">銘柄詳細はモーダルではなく行内に展開します。信用需給は日本株の銘柄行に常時表示します。</div></div></details>`;
};

const originalOpenFrame=window.openFrame;
if(typeof originalOpenFrame==='function')window.openFrame=function(symbol,name,market,source){return originalOpenFrame.call(this,symbol,preferredLocalName(symbol,name),market,source)};

window.openAddWatch=function(){
 $('modal-title').textContent='ウォッチ追加';
 $('modal-body').innerHTML=`<div class="formgrid"><select id="aw-market"><option value="jp">日本株</option><option value="us">米国株</option></select><input id="aw-symbol" placeholder="日本4桁 / 米国ティッカー"><input class="span2" id="aw-name" placeholder="日本語名（通常は自動取得）"><div class="span2 note">日本株は登録銘柄・市場分析・ランキングから日本語名を優先します。取得できない場合だけ日本語名を入力してください。</div><div class="span2 actions"><button class="primary" onclick="addWatchManual()">追加</button></div></div>`;
 openModal();
};
window.addWatchManual=async function(){
 const market=$('aw-market').value,symbol=$('aw-symbol').value.trim(),manual=$('aw-name')?.value.trim();if(!symbol){toast('銘柄コードを入力してください');return}
 try{
  const q=await api('/api/watchlist',{method:'POST',body:{action:'resolve_name',market,symbol}});
  let name=manual||await resolveJapaneseName(q.symbol,q.name);
  if(market==='jp'&&!jpText(name)){const entered=prompt('日本語名を入力してください',code(q.symbol));if(!entered?.trim())throw new Error('日本語名を確認できませんでした');name=entered.trim()}
  await api('/api/watchlist',{method:'POST',body:{action:'add',market,symbol:q.symbol,name,source:'manual'}});
  toast(`${name}を追加しました`);closeModal();loadWatch();
 }catch(e){toast(e.message)}
};
window.addStock=async function(){
 try{
  const symbol=$('sl-symbol').value.trim();if(!symbol)throw new Error('銘柄コードを入力してください');
  let name=$('sl-name').value.trim();name=await resolveJapaneseName(symbol,name);
  if(state.market==='jp'&&!jpText(name)){const entered=prompt('日本語名を入力してください',code(symbol));if(!entered?.trim())throw new Error('日本語名を確認できませんでした');name=entered.trim()}
  await api('/api/stocklist?market='+state.market,{method:'POST',body:{action:'add',symbol,name}});openStockEditor();
 }catch(e){toast(e.message)}
};

function promoteRegisteredStocks(){
 const tab=document.querySelector('[data-watch-view="universe"]');if(tab)tab.textContent='登録銘柄';
 const root=$('universe-list');if(!root)return;
 const cards=[...root.querySelectorAll('.universe-current')];if(!cards.length)return;
 for(const card of cards){card.open=true;card.classList.add('v52-current-open')}
 for(const title of root.querySelectorAll('.section-title'))if(title.textContent.trim()==='現在の登録銘柄')title.remove();
 let intro=root.querySelector('.v52-registered-intro');
 if(!intro){intro=document.createElement('div');intro.className='v52-registered-intro';intro.innerHTML='<h2>現在の登録銘柄</h2><p>VANTAGEが日々分析している全銘柄です。日本株・米国株のカードを開いた状態で表示します。</p>';root.prepend(intro)}
 let anchor=intro;for(const card of cards){anchor.after(card);anchor=card}
 if(!root.querySelector('.v52-auto-title')){const title=document.createElement('div');title.className='section-title v52-auto-title';title.textContent='自動入替・テーマ構成';anchor.after(title)}
}
const originalUniverseCurrentBlock=window.universeCurrentBlock;
if(typeof originalUniverseCurrentBlock==='function')window.universeCurrentBlock=function(label,items=[]){const html=originalUniverseCurrentBlock.apply(this,arguments);return html.replace('class="card universe-current"','class="card universe-current v52-current-open"').replace('<details class="card universe-current v52-current-open">','<details class="card universe-current v52-current-open" open>')};
const originalLoadUniverse=window.loadUniverse;
if(typeof originalLoadUniverse==='function')window.loadUniverse=async function(){const out=await originalLoadUniverse.apply(this,arguments);promoteRegisteredStocks();return out};
const universeTab=document.querySelector('[data-watch-view="universe"]');if(universeTab)universeTab.textContent='登録銘柄';
})();

let quoteAutoSyncBusy=false;
async function autoSyncVisibleQuotes(){
 if(document.hidden||quoteAutoSyncBusy)return;
 quoteAutoSyncBusy=true;
 try{
  if(state.tab==='stage')await loadStage();
  else if(state.tab==='themes'&&['radar','board'].includes(state.themeView))await loadThemeView();
  else if(state.tab==='watch'&&state.watchView==='list')await loadWatch();
 }catch{}finally{quoteAutoSyncBusy=false}
}
setInterval(autoSyncVisibleQuotes,300000);
addEventListener('visibilitychange',()=>{if(!document.hidden)autoSyncVisibleQuotes()});
if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js?v=51-backtest-integrity').then(r=>r.update()).catch(()=>{}));
syncMarketButtons(state.market);syncThemeScopeButtons();loadStage();
</script>

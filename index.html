<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#19202b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>VANTAGE</title>
<style>
*{box-sizing:border-box}html,body{margin:0}button,input,select,textarea{font:inherit}
:root{
 --bg:#e9ebef;--surface:#f8f9fb;--surface2:#eef1f4;--line:#d4d9e1;
 --text:#19202b;--muted:#657082;--faint:#8a93a1;--blue:#2f6fe0;
 --green:#16815a;--greenbg:#def2e8;--red:#c92c43;--redbg:#f9e1e5;
 --amber:#a96b06;--amberbg:#f8ead0;--shadow:0 1px 3px rgba(16,24,40,.07);
 --r:12px;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;max-width:900px;margin:auto;padding:10px 12px 72px;line-height:1.45}
button{border:1px solid var(--line);background:var(--surface2);color:var(--text);border-radius:8px;padding:7px 11px;cursor:pointer}
button.primary{background:var(--blue);border-color:var(--blue);color:#fff}
button.danger{color:var(--red)}button:disabled{opacity:.45}.small{font-size:12px;padding:5px 8px}
header{display:flex;align-items:center;gap:10px;padding:7px 2px 10px}
.brand{font-weight:800;letter-spacing:.08em}.version{font:10px var(--mono);color:var(--faint)}
.header-spacer{flex:1}.clock{font:11px var(--mono);color:var(--muted)}.iconbtn{width:34px;height:34px;padding:0;font-size:17px}
.tabs{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:rgba(233,235,239,.96);padding:4px 0 8px;backdrop-filter:blur(10px)}
.tabs button{background:transparent;border:none;border-radius:8px;color:var(--muted);font-weight:700}
.tabs button.active{background:var(--surface);box-shadow:var(--shadow);color:var(--text)}
.panel{display:none}.panel.active{display:block}
.toolbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:9px 0}
.segment{display:flex;gap:4px;background:var(--surface);padding:4px;border:1px solid var(--line);border-radius:10px}
.segment button{flex:1;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:700}
.segment button.active{background:var(--blue);color:white}.segment.grow{width:100%}
.market button.active{background:#19202b;color:#fff}
.fresh{font:11px var(--mono);color:var(--muted);margin-left:auto}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin:8px 0}
.pad{padding:12px}.section-title{font-size:11px;letter-spacing:.08em;color:var(--muted);font-weight:800;margin:14px 3px 7px}
.state-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.state-box{padding:12px;border-radius:var(--r);border:1px solid var(--line);background:var(--surface)}
.state-box .k{font-size:11px;color:var(--muted)}.state-box .v{font-size:17px;font-weight:800;margin-top:2px}
.state-box.good{background:var(--greenbg)}.state-box.warn{background:var(--amberbg)}.state-box.bad{background:var(--redbg)}
.mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.mini{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 10px}
.mini .k{font-size:10px;color:var(--muted)}.mini .v{font:700 14px var(--mono)}
.up{color:var(--green)}.down{color:var(--red)}.muted{color:var(--muted)}
.row{display:flex;align-items:center;gap:8px;padding:10px 11px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}.name{font-weight:750;min-width:0}.code{font:10px var(--mono);color:var(--faint)}
.grow1{flex:1;min-width:0}.right{text-align:right}.num{font-family:var(--mono)}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:800;padding:2px 6px;border-radius:5px;background:var(--surface2);color:var(--muted);white-space:nowrap}
.badge.A,.badge.B{background:var(--greenbg);color:var(--green)}.badge.C{background:#e4ebfa;color:#2f5fad}.badge.E{background:var(--redbg);color:var(--red)}
.badge.held{background:#dff3e9;color:var(--green)}
.meta{display:flex;gap:8px;flex-wrap:wrap;font:11px var(--mono);color:var(--muted);margin-top:4px}
details>summary{cursor:pointer;list-style:none}details>summary::-webkit-details-marker{display:none}
.lane{margin:7px 0;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.lane>summary{display:flex;align-items:center;gap:7px;padding:11px 12px;font-weight:800}
.count{margin-left:auto;font:11px var(--mono);color:var(--muted)}
.candidate{padding:9px 11px;border-top:1px solid var(--line);cursor:pointer}
.candidate:active,.compact-row:active{background:var(--surface2)}
.candidate-head{display:flex;align-items:center;gap:7px}.candidate .name{font-size:14px}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.detail-block{padding:10px 0;border-top:1px solid var(--line);font-size:12px}
.detail-label{font-size:10px;color:var(--muted);font-weight:800;margin-bottom:3px}
.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.rank-row,.compact-row{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 10px;margin:6px 0;cursor:pointer}
.rank-head,.compact-head{display:flex;align-items:center;gap:7px}.rank-no{font:700 11px var(--mono);color:var(--blue);width:24px}
.note{font-size:11px;color:var(--muted);background:var(--surface2);border-radius:8px;padding:8px 10px;margin:7px 0}
.warnline{color:var(--amber);font-size:11px;margin:6px 0}
.watch-detail,.signal-detail{padding:0 10px 10px}.watch-detail summary,.signal-detail summary{font-size:11px;color:var(--blue);padding-top:5px}
.formgrid{display:grid;grid-template-columns:110px 1fr;gap:8px;margin-top:8px}
.formgrid input,.formgrid select,.formgrid textarea,.fullinput{width:100%;border:1px solid var(--line);border-radius:8px;background:white;padding:8px;color:var(--text)}
.formgrid textarea{min-height:74px;resize:vertical}.formgrid .span2{grid-column:1/-1}
.signal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px;text-align:center}
.stat .v{font:700 15px var(--mono)}.stat .k{font-size:9px;color:var(--muted)}
.outcomes{display:flex;gap:5px;flex-wrap:wrap}.outcome{font:10px var(--mono);background:var(--surface2);padding:3px 6px;border-radius:5px}
.event-time{font:11px var(--mono);color:var(--muted)}.event-count{font:700 13px var(--mono)}
.empty{padding:24px;text-align:center;color:var(--muted);font-size:12px}.loading{padding:20px;text-align:center;color:var(--muted)}
.modal-bg{position:fixed;inset:0;background:rgba(15,22,33,.48);display:none;align-items:flex-end;justify-content:center;z-index:100}
.modal-bg.open{display:flex}.modal{width:min(900px,100%);max-height:88vh;overflow:auto;background:var(--bg);border-radius:18px 18px 0 0;padding:14px 12px calc(14px + env(safe-area-inset-bottom))}
.modal-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}.modal-title{font-weight:800}.modal-head .close{margin-left:auto}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#17202c;color:white;padding:8px 13px;border-radius:999px;font-size:12px;display:none;z-index:200}
.toast.show{display:block}
.offline{position:fixed;top:6px;left:50%;transform:translateX(-50%);background:var(--amberbg);color:var(--amber);font-size:11px;padding:4px 9px;border-radius:999px;display:none;z-index:300}
.offline.show{display:block}
.hidden{display:none!important}
@media(min-width:680px){body{padding:16px 18px 80px}.modal-bg{align-items:center}.modal{border-radius:16px;max-width:620px}.mini-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:520px){
 body{padding:7px 9px 70px}.clock{display:none}.version{display:none}
 .state-grid{grid-template-columns:1fr 1fr}.toolbar{gap:5px}
 .fresh{width:100%;margin-left:0}.candidate{padding:8px 9px}.meta{gap:5px 8px}
 .formgrid{grid-template-columns:1fr}.formgrid .span2{grid-column:auto}
 .actions button{flex:1}.section-title{margin-top:12px}
}
</style>
</head>
<body>
<div class="offline" id="offline">オフライン</div>
<header>
  <div class="brand">VANTAGE</div><div class="version">v25</div>
  <div class="header-spacer"></div><div class="clock" id="clock"></div>
  <button class="iconbtn" onclick="openSettings()" aria-label="設定">⚙</button>
</header>
<nav class="tabs">
  <button class="active" data-tab="stage" onclick="switchTab('stage')">Stage</button>
  <button data-tab="watch" onclick="switchTab('watch')">ウォッチ</button>
  <button data-tab="events" onclick="switchTab('events')">イベント</button>
</nav>

<main>
<section id="tab-stage" class="panel active">
  <div class="toolbar market">
    <button id="m-jp" class="active" onclick="setMarket('jp')">日本</button>
    <button id="m-us" onclick="setMarket('us')">米国</button>
    <span class="fresh" id="stage-fresh">取得中…</span>
  </div>
  <div class="segment grow">
    <button class="active" data-stage-view="summary" onclick="setStageView('summary')">市場状態</button>
    <button data-stage-view="board" onclick="setStageView('board')">候補ボード</button>
    <button data-stage-view="ranking" onclick="setStageView('ranking')">ランキング</button>
  </div>
  <div id="stage-summary"></div>
  <div id="stage-board" class="hidden"></div>
  <div id="stage-ranking" class="hidden"></div>
</section>

<section id="tab-watch" class="panel">
  <div class="segment grow">
    <button class="active" data-watch-view="list" onclick="setWatchView('list')">ウォッチ</button>
    <button data-watch-view="signals" onclick="setWatchView('signals')">シグナル検証</button>
  </div>
  <div id="watch-list-view">
    <div class="toolbar">
      <select id="watch-sort" onchange="setWatchSort(this.value)">
        <option value="board">候補ボード順</option>
        <option value="added">追加日順</option>
        <option value="market">市場別</option>
      </select>
      <button class="primary small" onclick="openAddWatch()">＋追加</button>
    </div>
    <div id="watch-list"></div>
  </div>
  <div id="signals-view" class="hidden"><div id="signal-list"></div></div>
</section>

<section id="tab-events" class="panel">
  <div class="toolbar">
    <button class="primary" onclick="copyAI(this)">AI分析用コピー</button>
    <button onclick="openEventForm()">＋追加</button>
    <button class="small" onclick="clearPastEvents()">過去分を整理</button>
  </div>
  <div id="event-list"></div>
</section>
</main>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head"><div class="modal-title" id="modal-title"></div><button class="close" onclick="closeModal()">閉じる</button></div>
    <div id="modal-body"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API_BASE=location.hostname==='localhost'?'http://localhost:8787':'https://cockpit-backend.miyab.workers.dev';
const VERSION='v25.0.0';
const state={
 tab:'stage',market:'jp',stageView:'summary',watchView:'list',
 stage:{jp:null,us:null},notrade:{jp:null,us:null},momentum:{jp:null,us:null},
 ranking:{jp:null,us:null},watch:null,signals:null,events:null,positions:null,
 watchSort:localStorage.getItem('vantage_watch_sort')||'board'
};
const $=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const attr=v=>esc(v).replace(/`/g,'&#96;');
const num=(v,d=2)=>v==null||Number.isNaN(Number(v))?'—':Number(v).toLocaleString('ja-JP',{maximumFractionDigits:d});
const pct=v=>v==null||Number.isNaN(Number(v))?'—':(Number(v)>=0?'+':'')+Number(v).toFixed(1)+'%';
const cls=v=>Number(v)>=0?'up':'down';
const code=s=>String(s||'').replace(/\.T$/,'');
const marketOf=s=>String(s||'').endsWith('.T')?'jp':'us';
const dateText=v=>{if(!v)return'—';const d=new Date(v);return Number.isNaN(d.getTime())?String(v):d.toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function writeHeaders(){const h={'Content-Type':'application/json'};const k=localStorage.getItem('vantage_write_key');if(k)h['X-Vantage-Key']=k;return h}
async function api(path,opt={}){
 const options={...opt};if(options.body&&typeof options.body!=='string')options.body=JSON.stringify(options.body);
 if(options.write||options.method&&options.method!=='GET'){options.headers={...writeHeaders(),...(options.headers||{})};delete options.write}
 const r=await fetch(API_BASE+path,options);let d=null;try{d=await r.json()}catch{}
 if(!r.ok)throw new Error(d?.error||('API '+r.status));return d;
}
function toast(msg){const e=$('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800)}
function updateClock(){$('clock').textContent=new Date().toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false})}
setInterval(updateClock,30000);updateClock();
function net(){ $('offline').classList.toggle('show',!navigator.onLine)}addEventListener('online',net);addEventListener('offline',net);net();

function switchTab(tab){
 state.tab=tab;document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
 document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+tab));
 if(tab==='stage')loadStage();
 if(tab==='watch')state.watchView==='signals'?loadSignals():loadWatch();
 if(tab==='events')loadEvents();
 scrollTo({top:0});
}
function setMarket(m){
 state.market=m;$('m-jp').classList.toggle('active',m==='jp');$('m-us').classList.toggle('active',m==='us');loadStage();
}
function setStageView(v){
 state.stageView=v;document.querySelectorAll('[data-stage-view]').forEach(b=>b.classList.toggle('active',b.dataset.stageView===v));
 $('stage-summary').classList.toggle('hidden',v!=='summary');$('stage-board').classList.toggle('hidden',v!=='board');$('stage-ranking').classList.toggle('hidden',v!=='ranking');
 if(v==='ranking')loadRanking();
}
function setWatchView(v){
 state.watchView=v;document.querySelectorAll('[data-watch-view]').forEach(b=>b.classList.toggle('active',b.dataset.watchView===v));
 $('watch-list-view').classList.toggle('hidden',v!=='list');$('signals-view').classList.toggle('hidden',v!=='signals');
 v==='signals'?loadSignals():loadWatch();
}

async function loadStage(){
 const m=state.market;$('stage-fresh').textContent='取得中…';
 try{
  const [st,nt,mom,pos,ev]=await Promise.all([
   api('/api/stage?market='+m),api('/api/notrade?market='+m),api('/api/momentum?market='+m),
   api('/api/positions').catch(()=>({positions:[]})),api('/api/events').catch(()=>({events:[]})),
  ]);
  state.stage[m]=st;state.notrade[m]=nt;state.momentum[m]=mom;state.positions=pos;state.events=ev;
  $('stage-fresh').textContent=(st.freshness||'')+(st.price_time?' · '+st.price_time:'')+(st.vol_partial?' · 暫定':'');
  renderSummary(m);renderBoard(m);
 }catch(e){$('stage-fresh').textContent='取得失敗';$('stage-summary').innerHTML='<div class="card pad down">'+esc(e.message)+'</div>'}
}
function marketState(st,m){
 const macro=st?.macro||{};const ix=m==='jp'?macro['日経平均']:macro['S&P500'];
 const d=ix?.change_pct??0,r5=ix?.ret5??0;
 if(d>0&&r5>0)return{label:'上向き',kind:'good'};
 if(d<-1||r5<-2)return{label:'弱い',kind:'bad'};
 return{label:'中立',kind:'warn'};
}
function momentumState(nt){
 if(nt?.recLevel==='strong')return{label:'過熱・回避',kind:'bad'};
 if(nt?.recLevel==='recommend')return{label:'選別',kind:'warn'};
 return{label:'通常',kind:'good'};
}
function nextEvent(){
 const now=Date.now(),list=(state.events?.events||[]).filter(e=>new Date(e.time)>now).sort((a,b)=>new Date(a.time)-new Date(b.time));
 return list[0]||null;
}
function renderSummary(m){
 const st=state.stage[m],nt=state.notrade[m];if(!st)return;
 const ms=marketState(st,m),mm=momentumState(nt),macro=st.macro||{},ev=nextEvent();
 const kospi=macro['韓国KOSPI'],kosdaq=macro['韓国KOSDAQ'];
 const ix=m==='jp'?macro['日経平均']:macro['S&P500'];
 const hot=nt?.summary||{};
 let html='<div class="section-title">判断の入口</div><div class="state-grid">'+
  `<div class="state-box ${ms.kind}"><div class="k">市場地合い</div><div class="v">${ms.label}</div></div>`+
  `<div class="state-box ${mm.kind}"><div class="k">モメンタム地合い</div><div class="v">${mm.label}</div></div></div>`;
 html+='<div class="section-title">主要確認</div><div class="mini-grid">'+
  mini(m==='jp'?'日経平均':'S&P500',ix)+mini('KOSPI',kospi)+mini('KOSDAQ',kosdaq)+
  `<div class="mini"><div class="k">次のイベント</div><div class="v" style="font:700 11px sans-serif">${ev?esc(ev.name):'登録なし'}</div><div class="k">${ev?dateText(ev.time):''}</div></div></div>`;
 html+=`<div class="section-title">モメンタム母集団</div><div class="card pad"><div class="meta"><span>拡張過大 ${hot.extreme_pct??'—'}%</span><span>RSI過熱 ${hot.rsi_hot??'—'}件</span><span>健全な押し目 ${hot.healthy_dips??'—'}件</span><span>上ヒゲ ${hot.shooting_stars??'—'}件</span></div>`;
 if(nt?.signals?.length)html+='<div class="warnline">'+nt.signals.slice(0,3).map(x=>esc(x.label)+'：'+esc(x.detail)).join('<br>')+'</div>';
 html+='</div><details class="card"><summary class="row"><div class="name">マクロ・指数を展開</div><span class="count">'+Object.keys(macro).length+'項目</span></summary>'+
  Object.entries(macro).filter(([,v])=>v).map(([k,v])=>`<div class="row"><div class="grow1"><div class="name">${esc(k)}</div><div class="code">${v.ret5!=null?'5日 '+pct(v.ret5):''}</div></div><div class="right num">${num(v.price)}<div class="${cls(v.change_pct)}">${pct(v.change_pct)}</div></div></div>`).join('')+'</details>';
 $('stage-summary').innerHTML=html;
}
function mini(k,v){return `<div class="mini"><div class="k">${k}</div><div class="v">${v?num(v.price):'—'}</div><div class="k ${v?cls(v.change_pct):''}">${v?pct(v.change_pct):''}</div></div>`}
function heldSet(){return new Set((state.positions?.positions||[]).map(p=>String(p.symbol).toUpperCase()))}
function watchSet(){return new Set((state.watch?.items||[]).map(w=>String(w.symbol).toUpperCase()))}
function renderBoard(m){
 const mom=state.momentum[m];if(!mom?.ready){$('stage-board').innerHTML='<div class="empty">候補なし</div>';return}
 const held=heldSet(),watched=watchSet();
 let html='<div class="note">長期Stageと短期セットアップを分け、相対強度と出来高で確認順を厳選しています。</div>';
 for(const lane of mom.board||[]){
  const open=lane.key==='A'||lane.key==='B'||lane.key==='C'?' open':'';
  html+=`<details class="lane"${open}><summary>${esc(lane.icon||'')} ${lane.key}. ${esc(lane.label)}<span class="count">${lane.total??lane.rows?.length??0}件</span></summary>`;
  if(!(lane.rows||[]).length)html+='<div class="empty">該当なし</div>';
  else html+=(lane.rows||[]).map(r=>candidateHtml(r,held,watched)).join('');
  html+='</details>';
 }
 $('stage-board').innerHTML=html;
}
function candidateHtml(r,held,watched){
 const sym=String(r.symbol).toUpperCase(),isHeld=held.has(sym),isWatch=watched.has(sym);
 return `<div class="candidate" onclick="openCandidate('${attr(sym)}')"><div class="candidate-head">`+
  `${isHeld?'<span class="badge held">保有</span>':''}<span class="name grow1">${esc(r.name)}</span><span class="code">${esc(code(sym))}</span>`+
  `${isWatch?'<span class="badge">観察</span>':''}<span class="badge ${r.entry_lane}">${r.entry_lane}</span></div>`+
  `<div class="meta"><span class="${cls(r.change_pct)}">${pct(r.change_pct)}</span><span>${num(r.price,marketOf(sym)==='jp'?0:2)}</span><span>出来高 ${num(r.effective_vol_ratio??r.vol_ratio)}x</span><span>25MA ${pct(r.div25)}</span>${r.rs5!=null?`<span>5日RS ${pct(r.rs5)}</span>`:''}</div>`+
  `<div class="tags">${r.setup_label?`<span class="badge B">${esc(r.setup_label)}</span>`:''}<span class="badge">${esc(r.long_stage||r.stage||'')}</span>${r.relative_label&&r.relative_label!=='通常'?`<span class="badge">${esc(r.relative_label)}</span>`:''}</div></div>`;
}
function findCandidate(sym){
 for(const m of ['jp','us'])for(const lane of state.momentum[m]?.board||[])for(const r of lane.rows||[])if(String(r.symbol).toUpperCase()===String(sym).toUpperCase())return r;
 return null;
}
async function ensureWatch(){if(!state.watch)state.watch=await api('/api/watchlist').catch(()=>({items:[]}));}
async function openCandidate(sym){
 await ensureWatch();const r=findCandidate(sym);if(!r)return;
 const isWatch=watchSet().has(sym),isHeld=heldSet().has(sym);
 $('modal-title').textContent=r.name+' '+code(sym);
 $('modal-body').innerHTML=`<div class="card pad"><div class="meta"><span class="badge ${r.entry_lane}">${r.entry_lane} ${esc(r.entry_label)}</span><span>${esc(r.long_stage||r.stage||'')}</span>${r.setup_label?`<span>${esc(r.setup_label)}</span>`:''}</div>`+
  block('検出理由',(r.entry_reason||[]).join(' / '))+block('相対評価',r.relative_text)+block('注意点',(r.risk_reason||[]).join(' / '))+
  `<div class="actions"><button onclick="openChart('${attr(sym)}')">チャート</button><button class="primary" ${isWatch?'disabled':''} onclick="addWatchFromCandidate('${attr(sym)}','${attr(r.name)}','${marketOf(sym)}')">${isWatch?'観察中':'ウォッチへ'}</button><button onclick="toggleHeld('${attr(sym)}','${attr(r.name)}','${marketOf(sym)}')">${isHeld?'保有解除':'保有☑'}</button></div></div>`;
 openModal();
}
function block(k,v){return v?`<div class="detail-block"><div class="detail-label">${k}</div>${esc(v)}</div>`:''}
function openChart(sym){const tv=String(sym).endsWith('.T')?'TSE:'+code(sym):sym;open('https://www.tradingview.com/chart/?symbol='+encodeURIComponent(tv),'_blank','noopener')}

async function loadRanking(force=false){
 const m=state.market;$('stage-ranking').innerHTML='<div class="loading">取得中…</div>';
 try{const d=await api('/api/ranking-enriched?market='+m+(force?'&refresh=1':''),force?{write:true}:{});
 state.ranking[m]=d;renderRanking(d,m)}catch(e){$('stage-ranking').innerHTML='<div class="card pad down">'+esc(e.message)+'</div>'}
}
function renderRanking(d,m){
 const stageDate=String(state.stage[m]?.updated_at||'').slice(0,10),rankDate=String(d.updated_at||'').slice(0,10);
 let html='<div class="toolbar"><button class="small" onclick="loadRanking(true)">更新</button></div>';
 if(stageDate&&rankDate&&stageDate!==rankDate)html+='<div class="warnline">ランキングの更新日がStageと一致していません。更新してください。</div>';
 html+=(d.items||[]).slice(0,50).map(it=>`<div class="rank-row" onclick="openChart('${attr(it.symbol)}')"><div class="rank-head"><span class="rank-no">${it.rank}</span><span class="name grow1">${esc(it.name)}</span><span class="code">${esc(code(it.symbol))}</span><span class="${cls(it.change_pct)} num">${pct(it.change_pct)}</span>${it.registered?'<span class="badge">登録済</span>':`<button class="small primary" onclick="event.stopPropagation();registerStock('${attr(it.symbol)}','${attr(it.name)}','${m}')">＋</button>`}</div><div class="meta"><span>${esc(it.stage||'未分析')}</span>${it.div25!=null?`<span>25MA ${pct(it.div25)}</span>`:''}${it.rsi!=null?`<span>RSI ${it.rsi}</span>`:''}</div></div>`).join('');
 html+=`<div class="note">更新 ${dateText(d.updated_at)}</div>`;$('stage-ranking').innerHTML=html;
}
async function registerStock(sym,name,m){try{await api('/api/stocklist?market='+m,{method:'POST',body:{action:'add',symbol:sym,name}});toast('登録しました');loadRanking()}catch(e){toast(e.message)}}

async function loadWatch(){
 $('watch-list').innerHTML='<div class="loading">取得中…</div>';
 try{
  const [w,jp,us,p]=await Promise.all([api('/api/watchlist'),api('/api/momentum?market=jp'),api('/api/momentum?market=us'),api('/api/positions')]);
  state.watch=w;state.momentum.jp=jp;state.momentum.us=us;state.positions=p;renderWatch();
 }catch(e){$('watch-list').innerHTML='<div class="card pad down">'+esc(e.message)+'</div>'}
}
function boardMap(){
 const map=new Map();for(const m of ['jp','us'])for(const lane of state.momentum[m]?.board||[])for(const r of lane.rows||[])map.set(String(r.symbol).toUpperCase(),r);return map;
}
function setWatchSort(v){state.watchSort=v;localStorage.setItem('vantage_watch_sort',v);renderWatch()}
function sortWatch(items){
 const bm=boardMap(),rank={A:0,B:1,C:2,D:3,E:4};
 return items.slice().sort((a,b)=>{
  if(state.watchSort==='added')return new Date(b.added_at||0)-new Date(a.added_at||0);
  if(state.watchSort==='market'){const d=String(a.market).localeCompare(String(b.market));if(d)return d}
  const ar=rank[bm.get(String(a.symbol).toUpperCase())?.entry_lane]??9,br=rank[bm.get(String(b.symbol).toUpperCase())?.entry_lane]??9;
  return ar-br||String(a.name).localeCompare(String(b.name),'ja');
 });
}
function renderWatch(){
 $('watch-sort').value=state.watchSort;const items=sortWatch(state.watch?.items||[]),bm=boardMap();
 if(!items.length){$('watch-list').innerHTML='<div class="empty">ウォッチは空です</div>';return}
 $('watch-list').innerHTML=items.map(w=>{
  const r=bm.get(String(w.symbol).toUpperCase())||w.stage_data||{},lane=r.entry_lane||'—';
  return `<details class="compact-row"><summary class="compact-head"><span class="name grow1">${esc(w.name)}</span><span class="code">${esc(code(w.symbol))}</span><span class="badge ${lane}">${lane}</span><span class="${cls(r.change_pct)} num">${pct(r.change_pct)}</span><span class="badge ${w.held?'held':''}">${w.held?'保有':'—'}</span></summary>`+
   `<div class="watch-detail"><div class="meta"><span>${esc(r.long_stage||r.stage||'未判定')}</span>${r.setup_label?`<span>${esc(r.setup_label)}</span>`:''}<span>追加 ${dateText(w.added_at)}</span></div>`+
   `<div class="formgrid"><select id="ws-${attr(w.id)}"><option value="tracking" ${w.status==='tracking'?'selected':''}>追跡中</option><option value="waiting" ${w.status==='waiting'?'selected':''}>押し待ち</option><option value="skip" ${w.status==='skip'?'selected':''}>見送り</option></select><textarea id="wm-${attr(w.id)}" placeholder="条件・押し目水準・決算前後の方針">${esc(w.memo||'')}</textarea></div>`+
   `<div class="actions"><button onclick="saveWatch('${attr(w.id)}')">保存</button><button onclick="openChart('${attr(w.symbol)}')">チャート</button><button onclick="toggleHeld('${attr(w.symbol)}','${attr(w.name)}','${w.market}')">${w.held?'保有解除':'保有☑'}</button><button onclick="refreshWatch('${attr(w.id)}')">再判定</button><button class="danger" onclick="deleteWatch('${attr(w.id)}')">削除</button></div></div></details>`;
 }).join('');
}
async function saveWatch(id){try{await api('/api/watchlist',{method:'POST',body:{action:'update',id,status:$('ws-'+id).value,memo:$('wm-'+id).value}});toast('保存しました');loadWatch()}catch(e){toast(e.message)}}
async function deleteWatch(id){if(!confirm('ウォッチから削除しますか？'))return;try{await api('/api/watchlist',{method:'POST',body:{action:'delete',id}});loadWatch()}catch(e){toast(e.message)}}
async function refreshWatch(id){try{await api('/api/watchlist',{method:'POST',body:{action:'refresh_stage',id}});toast('再判定しました');loadWatch()}catch(e){toast(e.message)}}
async function addWatchFromCandidate(symbol,name,market){try{await api('/api/watchlist',{method:'POST',body:{action:'add',symbol,name,market,source:'candidate'}});state.watch=null;toast('ウォッチへ追加');closeModal()}catch(e){toast(e.message)}}
function openAddWatch(){
 $('modal-title').textContent='ウォッチ追加';$('modal-body').innerHTML=`<div class="formgrid"><select id="aw-market"><option value="jp">日本株</option><option value="us">米国株</option></select><input id="aw-symbol" placeholder="日本4桁 / 米国ティッカー"><div class="span2 actions"><button class="primary" onclick="addWatchManual()">追加</button></div></div>`;openModal();
}
async function addWatchManual(){const market=$('aw-market').value,symbol=$('aw-symbol').value.trim();try{const q=await api('/api/watchlist',{method:'POST',body:{action:'resolve_name',market,symbol}});await api('/api/watchlist',{method:'POST',body:{action:'add',market,symbol:q.symbol,name:q.name,source:'manual'}});toast('追加しました');closeModal();loadWatch()}catch(e){toast(e.message)}}
async function toggleHeld(symbol,name,market){try{await api('/api/positions',{method:'POST',body:{action:'toggle_held',symbol,name,market}});state.positions=await api('/api/positions');toast('保有状態を更新');if(state.tab==='watch')loadWatch();else{renderBoard(state.market);closeModal()}}catch(e){toast(e.message)}}

async function loadSignals(){
 $('signal-list').innerHTML='<div class="loading">取得中…</div>';
 try{const d=await api('/api/signal-log?limit=240');state.signals=d;await ensureWatch();state.positions=await api('/api/positions');renderSignals()}catch(e){$('signal-list').innerHTML='<div class="card pad down">'+esc(e.message)+'</div>'}
}
function statFor(key,h='d5'){const s=(state.signals?.summary||[]).find(x=>x.key===key),v=s?.horizons?.[h];return v||null}
function renderSignals(){
 const d=state.signals||{},a=statFor('A'),b=statFor('B');
 let html='<div class="section-title">実績（終了シグナル）</div><div class="signal-stats">'+statHtml('A 5日',a)+statHtml('B 5日',b)+statHtml('検証数',{median:d.completed_count,win_rate:null,n:d.completed_count})+'</div>';
 const active=(d.items||[]).filter(x=>x.active),done=(d.items||[]).filter(x=>!x.active);
 html+=signalSection('現在のシグナル',active,true)+signalSection('終了・検証中',done,false);
 $('signal-list').innerHTML=html;
}
function statHtml(k,v){return `<div class="stat"><div class="v">${v?(v.win_rate==null?v.n:(pct(v.median))):'—'}</div><div class="k">${k}${v?.win_rate!=null?' / 勝率'+v.win_rate+'%':''}</div></div>`}
function signalSection(title,items,active){
 let h=`<div class="section-title">${title} ${items.length}件</div>`;if(!items.length)return h+'<div class="empty">該当なし</div>';
 return h+items.map(x=>signalCard(x,active)).join('');
}
function signalCard(x,active){
 const outcomes=Object.entries(x.outcomes||{}).map(([k,v])=>`<span class="outcome ${cls(v.return_pct)}">${k.replace('d','')}日 ${pct(v.return_pct)}</span>`).join('');
 const watched=watchSet().has(String(x.symbol).toUpperCase());
 return `<details class="compact-row"><summary class="compact-head"><span class="name grow1">${esc(x.name)}</span><span class="code">${esc(code(x.symbol))}</span><span class="badge ${x.entry_lane}">${x.entry_lane}</span><span class="${cls(x.current_return)} num">${pct(x.current_return)}</span></summary>`+
  `<div class="signal-detail"><div class="meta"><span>開始 ${x.start_date}</span><span>検出 ${x.times_seen||1}回</span><span>MFE ${pct(x.mfe)}</span><span>MAE ${pct(x.mae)}</span></div><div class="outcomes">${outcomes||'<span class="muted">結果集計中</span>'}</div>`+
  block('検出理由',x.reason)+block('相対評価',x.relative_text)+block('注意点',x.risk_reason)+
  `<div class="actions">${watched?'<button disabled>観察中</button>':`<button class="primary" onclick="signalToWatch('${attr(x.symbol)}','${attr(x.name)}','${x.market}','${attr(x.reason||'')}')">ウォッチへ</button>`}<button onclick="openChart('${attr(x.symbol)}')">チャート</button><button class="danger" onclick="deleteSignal('${attr(x.id)}')">削除</button></div></div></details>`;
}
async function signalToWatch(symbol,name,market,reason){try{await api('/api/watchlist',{method:'POST',body:{action:'add',symbol,name,market,source:'signal',memo:'シグナル: '+reason}});state.watch=null;toast('ウォッチへ追加');loadSignals()}catch(e){toast(e.message)}}
async function deleteSignal(id){if(!confirm('このシグナル期間を削除しますか？'))return;try{await api('/api/signal-log',{method:'POST',body:{action:'delete',id}});loadSignals()}catch(e){toast(e.message)}}

async function loadEvents(){
 $('event-list').innerHTML='<div class="loading">取得中…</div>';
 try{state.events=await api('/api/events');renderEvents()}catch(e){$('event-list').innerHTML='<div class="card pad down">'+esc(e.message)+'</div>'}
}
function renderEvents(){
 const now=Date.now(),events=(state.events?.events||[]).slice().sort((a,b)=>new Date(a.time)-new Date(b.time));
 const future=events.filter(e=>new Date(e.time)>=now),past=events.filter(e=>new Date(e.time)<now);
 let html='<div class="section-title">今後の重要日程</div><div class="card">'+(future.length?future.map(eventRow).join(''):'<div class="empty">登録なし</div>')+'</div>';
 if(past.length)html+=`<details class="card"><summary class="row"><div class="name">過去分</div><span class="count">${past.length}件</span></summary>${past.map(eventRow).join('')}</details>`;
 $('event-list').innerHTML=html;
}
function eventRow(e){
 const diff=new Date(e.time)-Date.now(),days=Math.ceil(diff/86400000);
 return `<div class="row"><button class="small" onclick="togglePin('${attr(e.id)}')">${e.pinned?'★':'☆'}</button><div class="grow1"><div class="name">${esc(e.name)}</div><div class="event-time">${dateText(e.time)}</div></div><div class="event-count">${diff>=0?(days<=1?'24h以内':days+'日'):'完了'}</div><button class="small danger" onclick="deleteEvent('${attr(e.id)}')">×</button></div>`;
}
function openEventForm(){
 $('modal-title').textContent='重要日程を追加';$('modal-body').innerHTML=`<div class="formgrid"><select id="ev-cat"><option value="macro">マクロ</option><option value="centralbank">中銀</option><option value="earnings">決算</option><option value="material">個別材料</option><option value="other">その他</option></select><input id="ev-name" placeholder="イベント名"><input class="span2" id="ev-time" type="datetime-local"><div class="span2 actions"><button class="primary" onclick="addEvent()">追加</button></div></div>`;openModal();
}
async function addEvent(){try{await api('/api/events',{method:'POST',body:{action:'add',name:$('ev-name').value,time:new Date($('ev-time').value).toISOString(),category:$('ev-cat').value}});closeModal();loadEvents()}catch(e){toast(e.message)}}
async function deleteEvent(id){if(!confirm('削除しますか？'))return;try{await api('/api/events',{method:'POST',body:{action:'delete',id}});loadEvents()}catch(e){toast(e.message)}}
async function togglePin(id){try{await api('/api/events',{method:'POST',body:{action:'toggle_pin',id}});loadEvents()}catch(e){toast(e.message)}}
async function clearPastEvents(){if(!confirm('過去の未固定イベントを削除しますか？'))return;try{const d=await api('/api/events',{method:'POST',body:{action:'clear_completed'}});toast(d.removed+'件整理');loadEvents()}catch(e){toast(e.message)}}

async function copyAI(btn){
 const old=btn.textContent;btn.disabled=true;btn.textContent='収集中…';
 try{
  const [jp,us,njp,nus,mjp,mus,w,sig,ev,pos]=await Promise.all([
   api('/api/stage?market=jp'),api('/api/stage?market=us'),api('/api/notrade?market=jp'),api('/api/notrade?market=us'),
   api('/api/momentum?market=jp'),api('/api/momentum?market=us'),api('/api/watchlist'),api('/api/signal-log?limit=60'),api('/api/events'),api('/api/positions')
  ]);
  const out=['# VANTAGE モメンタム分析用','目的: 自動売買ではなく、地合い・相対強度・出来高・短期セットアップを使った確認順の整理。'];
  for(const [label,st,nt,mom] of [['日本',jp,njp,mjp],['米国',us,nus,mus]]){
   const ms=marketState(st,label==='日本'?'jp':'us'),mm=momentumState(nt);
   out.push(`\n## ${label}市場\n- 市場地合い: ${ms.label}\n- モメンタム地合い: ${mm.label}\n- データ: ${st.price_time||st.updated_at||'—'}`);
   const mac=st.macro||{};for(const k of ['日経平均','S&P500','韓国KOSPI','韓国KOSDAQ','SOX','VIX','ドル円'])if(mac[k])out.push(`- ${k}: ${pct(mac[k].change_pct)} / 5日 ${pct(mac[k].ret5)}`);
   for(const lane of mom.board||[]){
    if(!['A','B','C'].includes(lane.key))continue;const limit=lane.key==='C'?3:lane.rows.length;
    out.push(`\n### ${lane.key}. ${lane.label}`);
    for(const r of (lane.rows||[]).slice(0,limit))out.push(`- ${r.name}(${r.symbol}) ${pct(r.change_pct)} / 出来高${num(r.effective_vol_ratio??r.vol_ratio)}x / 25MA${pct(r.div25)} / 5日RS${pct(r.rs5)} / 長期${r.long_stage||r.stage}${r.setup_label?' / '+r.setup_label:''}`);
   }
  }
  out.push('\n## 保有☑');for(const p of pos.positions||[])out.push(`- ${p.name||p.symbol}(${p.symbol})`);
  out.push('\n## ウォッチ');for(const x of (w.items||[]).slice(0,12))out.push(`- ${x.name}(${x.symbol}) / ${x.status||'tracking'}${x.memo?' / '+x.memo.slice(0,100):''}`);
  out.push('\n## シグナル実績');for(const s of sig.summary||[]){const d5=s.horizons?.d5;if(d5)out.push(`- ${s.label}: 5日中央値${pct(d5.median)} / 勝率${d5.win_rate}% / n=${d5.n}`)}
  out.push('\n## 7日以内の重要日程');const limit=Date.now()+7*86400000;for(const e of (ev.events||[]).filter(x=>new Date(x.time)>=Date.now()&&new Date(x.time)<=limit).sort((a,b)=>new Date(a.time)-new Date(b.time)))out.push(`- ${e.name}: ${dateText(e.time)}`);
  out.push('\n## 依頼\nA/Bを中心に3〜5本へ絞り、エントリー候補・押し待ち・見送りを分けてください。長期Stageと短期セットアップを混同せず、相対強度・出来高・重要日程・保有との矛盾も指摘してください。');
  await navigator.clipboard.writeText(out.join('\n'));toast('コピーしました');
 }catch(e){toast(e.message)}finally{btn.disabled=false;btn.textContent=old}
}

function openSettings(){
 $('modal-title').textContent='設定';
 const key=localStorage.getItem('vantage_write_key')||'';
 $('modal-body').innerHTML=`<div class="card pad"><div class="detail-label">書き込みキー（任意）</div><input class="fullinput" id="write-key" type="password" value="${attr(key)}" placeholder="Cloudflare WRITE_TOKENを設定した場合"><div class="actions"><button onclick="saveWriteKey()">保存</button></div></div>`+
 `<div class="card pad"><div class="name">Stage管理</div><div class="actions"><button onclick="recalcStage()">現在市場を再計算</button><button onclick="openStockEditor()">銘柄編集</button></div></div>`+
 `<div class="card pad"><div class="name">指数通知</div><div class="actions"><button onclick="enablePush()">通知を有効化</button><button onclick="testPush()">テスト</button></div></div>`+
 `<div class="note">Frontend ${VERSION} / Backendは /api/health で確認</div>`;
 openModal();
}
function saveWriteKey(){localStorage.setItem('vantage_write_key',$('write-key').value.trim());toast('保存しました')}
async function recalcStage(){
 if(!confirm((state.market==='jp'?'日本':'米国')+'を再計算します。数十秒かかります。'))return;
 try{for(let i=1;i<=4;i++){toast('再計算 '+i+'/4');await api('/api/stage-run?batch='+state.market+i,{write:true})}await api('/api/ranking-enriched?market='+state.market+'&refresh=1',{write:true});toast('完了');closeModal();loadStage()}catch(e){toast(e.message)}
}
async function openStockEditor(){
 try{const d=await api('/api/stocklist?market='+state.market);$('modal-title').textContent='銘柄編集 '+d.count+'/'+d.max;
 $('modal-body').innerHTML=`<div class="formgrid"><input id="sl-symbol" placeholder="ティッカー"><input id="sl-name" placeholder="名称（空欄可）"><div class="span2 actions"><button class="primary" onclick="addStock()">追加</button></div></div><div class="card">${(d.list||[]).map(x=>`<div class="row"><div class="grow1"><span class="name">${esc(x.name)}</span> <span class="code">${esc(x.symbol)}</span></div><button class="small danger" onclick="deleteStock('${attr(x.symbol)}')">×</button></div>`).join('')}</div>`;}catch(e){toast(e.message)}
}
async function addStock(){try{await api('/api/stocklist?market='+state.market,{method:'POST',body:{action:'add',symbol:$('sl-symbol').value,name:$('sl-name').value}});openStockEditor()}catch(e){toast(e.message)}}
async function deleteStock(symbol){if(!confirm(symbol+'を削除しますか？'))return;try{await api('/api/stocklist?market='+state.market,{method:'POST',body:{action:'delete',symbol}});openStockEditor()}catch(e){toast(e.message)}}
function b64ToBytes(s){const pad='='.repeat((4-s.length%4)%4),b=atob((s+pad).replace(/-/g,'+').replace(/_/g,'/'));return Uint8Array.from([...b].map(c=>c.charCodeAt(0)))}
async function enablePush(){try{const perm=await Notification.requestPermission();if(perm!=='granted')throw new Error('通知が許可されていません');const reg=await navigator.serviceWorker.ready;const k=await api('/api/push/key');let sub=await reg.pushManager.getSubscription();if(!sub)sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64ToBytes(k.key)});await api('/api/push/subscribe',{method:'POST',body:{subscription:sub.toJSON()}});toast('通知を有効化')}catch(e){toast(e.message)}}
async function testPush(){try{await api('/api/push/test',{write:true});toast('送信しました')}catch(e){toast(e.message)}}

function openModal(){$('modal-bg').classList.add('open')}function closeModal(){$('modal-bg').classList.remove('open')}
if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js?v=v25').then(r=>r.update()).catch(()=>{}));
loadStage();
</script>

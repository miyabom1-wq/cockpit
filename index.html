<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="観察">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>観察モード・コックピット</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1c1c1c;
    --surface-3: #232323;
    --border: #262626;
    --border-strong: #353535;
    --text: #f5f5f5;
    --text-2: #a0a0a0;
    --text-3: #6b6b6b;
    --accent: #f5f5f5;
    --green: #4ade80;
    --green-dim: #1a3528;
    --red: #f87171;
    --red-dim: #3a1818;
    --amber: #fbbf24;
    --amber-dim: #3a2a0a;
    --blue: #60a5fa;
    --blue-dim: #1a2a3e;
    --radius: 8px;
    --radius-lg: 12px;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, monospace;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --surface-2: #f5f5f4;
      --surface-3: #ececea;
      --border: #e5e5e3;
      --border-strong: #d4d4d2;
      --text: #0a0a0a;
      --text-2: #525252;
      --text-3: #a3a3a3;
      --accent: #0a0a0a;
      --green: #15803d;
      --green-dim: #e8f5ee;
      --red: #b91c1c;
      --red-dim: #fbe9e9;
      --amber: #a16207;
      --amber-dim: #faf3e3;
      --blue: #1d4ed8;
      --blue-dim: #e8eef9;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 15px; line-height: 1.55;
    padding: 20px 16px 60px;
    max-width: 960px; margin: 0 auto;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "palt";
  }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

  /* Header */
  header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px; padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  header .title { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  header .meta { display: flex; gap: 16px; align-items: center; font-size: 12px; color: var(--text-3); }
  header .clock { font-family: var(--mono); }
  header .refresh-btn {
    background: transparent; border: 1px solid var(--border-strong);
    color: var(--text-2); padding: 6px 12px; border-radius: 6px;
    font-size: 12px; cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  header .refresh-btn:hover { color: var(--text); border-color: var(--text-3); }
  header .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

  /* Section */
  section { margin-bottom: 28px; }
  .sec-title {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 12px;
  }
  .sec-title h2 {
    font-size: 11px; font-weight: 600; color: var(--text-2);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .sec-title .ai-tag {
    font-size: 10px; color: var(--blue); background: var(--blue-dim);
    padding: 2px 8px; border-radius: 4px; letter-spacing: 0.04em;
    text-transform: uppercase; font-weight: 600;
  }
  .sec-title .updated { font-size: 11px; color: var(--text-3); font-family: var(--mono); }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 18px 20px;
  }
  .card.compact { padding: 14px 16px; }

  /* AI Summary */
  .ai-summary { line-height: 1.7; }
  .ai-summary p { margin-bottom: 10px; }
  .ai-summary p:last-child { margin-bottom: 0; }
  .ai-summary .verdict {
    display: inline-block; padding: 4px 12px; border-radius: 4px;
    font-size: 13px; font-weight: 600; margin-bottom: 12px;
  }
  .ai-summary .verdict.bull { background: var(--green-dim); color: var(--green); }
  .ai-summary .verdict.bear { background: var(--red-dim); color: var(--red); }
  .ai-summary .verdict.neutral { background: var(--surface-3); color: var(--text-2); }
  .ai-summary .verdict.warn { background: var(--amber-dim); color: var(--amber); }
  .ai-summary ul { margin: 8px 0 0 18px; }
  .ai-summary li { margin-bottom: 4px; }

  /* Events */
  .events { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
  .ev-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
  }
  .ev-card .ev-label { font-size: 12px; color: var(--text-2); margin-bottom: 6px; }
  .ev-card .ev-value { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .ev-card .ev-sub { font-size: 11px; color: var(--text-3); margin-top: 4px; font-family: var(--mono); }
  .ev-card.imminent { border-color: var(--amber); }
  .ev-card.imminent .ev-value { color: var(--amber); }
  .ev-card.past .ev-value { color: var(--text-3); font-size: 16px; }

  /* Macro */
  .macro { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
  .macro-cell {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    transition: border-color 0.2s;
  }
  .macro-cell.bull { border-color: var(--green); background: var(--green-dim); }
  .macro-cell.bear { border-color: var(--red); background: var(--red-dim); }
  .macro-cell.warn { border-color: var(--amber); background: var(--amber-dim); }
  .macro-cell .m-label { font-size: 12px; color: var(--text-2); margin-bottom: 6px; }
  .macro-cell .m-value { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .macro-cell .m-change { font-size: 11px; color: var(--text-3); margin-top: 4px; font-family: var(--mono); }
  .macro-cell .m-change.up { color: var(--green); }
  .macro-cell .m-change.down { color: var(--red); }

  /* Scenarios */
  .scn-list { display: flex; flex-direction: column; }
  .scn-item {
    padding: 16px 0; border-bottom: 1px solid var(--border);
  }
  .scn-item:last-child { border-bottom: none; }
  .scn-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .scn-name { font-size: 14px; font-weight: 600; }
  .scn-name .ret { color: var(--text-2); font-weight: 400; font-size: 13px; margin-left: 8px; }
  .scn-name .ret.pos { color: var(--green); }
  .scn-name .ret.neg { color: var(--red); }
  .scn-prob { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 50px; text-align: right; }
  .scn-rationale { font-size: 13px; color: var(--text-2); line-height: 1.55; }
  .scn-bar {
    height: 4px; background: var(--surface-3); border-radius: 2px; overflow: hidden;
    margin-top: 10px;
  }
  .scn-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
  .scn-summary {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-strong);
  }
  .scn-summary .ev-label { font-size: 12px; color: var(--text-2); }
  .scn-summary .ev-value { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .scn-summary .ev-value.pos { color: var(--green); }
  .scn-summary .ev-value.neg { color: var(--red); }

  /* Watchlist */
  .watch-row {
    display: grid; grid-template-columns: 1fr 90px 1fr 1fr;
    gap: 12px; padding: 14px 0;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .watch-row:last-child { border-bottom: none; }
  .watch-name { font-size: 14px; font-weight: 600; }
  .watch-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .watch-price { text-align: right; font-family: var(--mono); font-size: 14px; font-weight: 500; }
  .watch-price .chg { font-size: 11px; display: block; }
  .watch-price .chg.up { color: var(--green); }
  .watch-price .chg.down { color: var(--red); }
  .watch-trigger {
    background: var(--blue-dim); padding: 6px 10px; border-radius: 6px;
    font-size: 11px; color: var(--blue);
  }
  .watch-trigger .lbl { color: var(--text-2); display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
  .watch-trigger .val { font-family: var(--mono); font-weight: 600; }
  .watch-trigger.warn { background: var(--amber-dim); color: var(--amber); }
  .watch-trigger.danger { background: var(--red-dim); color: var(--red); }

  /* Checklist */
  .check-group { margin-bottom: 18px; }
  .check-group:last-child { margin-bottom: 0; }
  .check-group-title {
    font-size: 11px; color: var(--text-2); font-weight: 600;
    margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .check-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 0; cursor: pointer; font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  .check-row:last-child { border-bottom: none; }
  .check-row input[type="checkbox"] {
    margin-top: 2px; accent-color: var(--accent);
    width: 18px; height: 18px; cursor: pointer; flex-shrink: 0;
  }
  .check-row .ck-text { flex: 1; }
  .check-row.done .ck-text { color: var(--text-3); text-decoration: line-through; }
  .check-status {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border-strong);
    font-size: 14px;
  }
  .check-status .progress { color: var(--text-2); }
  .check-status .progress strong { color: var(--text); font-weight: 700; font-size: 16px; }
  .check-status .status {
    padding: 6px 14px; border-radius: 6px; font-weight: 600; font-size: 13px;
  }
  .check-status .status.locked { background: var(--red-dim); color: var(--red); }
  .check-status .status.partial { background: var(--amber-dim); color: var(--amber); }
  .check-status .status.cleared { background: var(--green-dim); color: var(--green); }

  /* Loading */
  .loading {
    color: var(--text-3); font-size: 13px; text-align: center;
    padding: 24px; font-style: italic;
  }
  .err {
    background: var(--red-dim); color: var(--red); padding: 12px 16px;
    border-radius: var(--radius); font-size: 13px;
  }

  /* Footer */
  footer {
    text-align: center; font-size: 11px; color: var(--text-3);
    padding-top: 20px; border-top: 1px solid var(--border); margin-top: 20px;
  }
  footer code { font-family: var(--mono); background: var(--surface-2); padding: 1px 6px; border-radius: 3px; }

  /* Mobile */
  @media (max-width: 640px) {
    body { padding: 16px 12px 40px; font-size: 14px; }
    header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .card { padding: 14px 16px; }
    .events, .macro { grid-template-columns: 1fr 1fr; }
    .watch-row { grid-template-columns: 1fr auto; gap: 8px; }
    .watch-row .watch-trigger { grid-column: 1 / -1; }
    .watch-row .watch-price { text-align: left; }
  }
</style>
</head>
<body>

<header>
  <div class="title">観察モード・コックピット</div>
  <div class="meta">
    <span class="clock num" id="clock">—</span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData(true)">更新</button>
  </div>
</header>

<!-- AI市況サマリー -->
<section>
  <div class="sec-title">
    <h2>市況サマリー</h2>
    <span class="ai-tag">AI</span>
  </div>
  <div class="card">
    <div class="ai-summary" id="ai-summary">
      <div class="loading">読み込み中...</div>
    </div>
  </div>
</section>

<!-- イベントカウントダウン -->
<section>
  <div class="sec-title">
    <h2>イベント</h2>
  </div>
  <div class="events" id="events-grid"></div>
</section>

<!-- マクロ指標 -->
<section>
  <div class="sec-title">
    <h2>マクロ指標</h2>
    <span class="updated" id="macro-updated">—</span>
  </div>
  <div class="macro" id="macro-grid">
    <div class="loading" style="grid-column: 1 / -1;">読み込み中...</div>
  </div>
</section>

<!-- シナリオ確率（AI生成） -->
<section>
  <div class="sec-title">
    <h2>NVDA決算シナリオ</h2>
    <span class="ai-tag">AI</span>
  </div>
  <div class="card">
    <div id="scenarios-list">
      <div class="loading">読み込み中...</div>
    </div>
    <div class="scn-summary" id="scn-summary" style="display: none;">
      <span class="ev-label">期待値（加重平均）</span>
      <span class="ev-value" id="ev-total">—</span>
    </div>
  </div>
</section>

<!-- 観察リスト（AI推奨水準） -->
<section>
  <div class="sec-title">
    <h2>観察リスト・推奨水準</h2>
    <span class="ai-tag">AI</span>
  </div>
  <div class="card">
    <div id="watchlist">
      <div class="loading">読み込み中...</div>
    </div>
  </div>
</section>

<!-- エントリーチェックリスト -->
<section>
  <div class="sec-title">
    <h2>エントリー判断チェックリスト</h2>
  </div>
  <div class="card">
    <div id="checklist-container"></div>
    <div class="check-status">
      <span class="progress"><strong id="check-count">0</strong> / <span id="check-total">0</span> クリア</span>
      <span class="status locked" id="check-status">ポジション禁止</span>
    </div>
  </div>
</section>

<footer>
  データ更新: 自動（朝7時・夕方17時 JST） / 手動更新は右上の更新ボタン<br>
  API: <code>/api/snapshot</code> ・ State: localStorage
</footer>

<script>
// ========================================================================
// Configuration
// ========================================================================
// Cloudflare Workers のエンドポイントURLをここに設定
const API_BASE = window.location.hostname === 'localhost'
  ? 'http://localhost:8787'
  : 'https://cockpit-backend.miyab.workers.dev';

const STORAGE_KEY = 'cockpit_v2';

// ========================================================================
// State
// ========================================================================
let state = {
  snapshot: null,    // バックエンドから取得した分析結果
  checklist: [
    { group: '構造的条件', items: [
      { text: 'NVDA決算結果を確認した', done: false },
      { text: 'セクター全体の地合いが回復している', done: false },
      { text: '米10年債4.55%超えが解消、または安定', done: false }
    ]},
    { group: '技術的条件', items: [
      { text: '底入れシーケンス確認（陽線復帰＋出来高）', done: false },
      { text: '主要MA回復', done: false },
      { text: 'ボリンジャーバンド内回帰', done: false }
    ]},
    { group: '心理的条件', items: [
      { text: '「持っていれば良かった」が消えている', done: false },
      { text: 'エントリー価格・サイズ・損切り価格を事前文書化', done: false },
      { text: '「ルール違反でない」を文章で確認できる', done: false }
    ]}
  ]
};

// ========================================================================
// Persistence
// ========================================================================
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.checklist) state.checklist = saved.checklist;
      if (saved.snapshot) state.snapshot = saved.snapshot;
    }
  } catch (e) { console.warn(e); }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.warn(e); }
}

// ========================================================================
// Clock
// ========================================================================
function updateClock() {
  const fmt = new Date().toLocaleString('ja-JP', {
    month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  });
  document.getElementById('clock').textContent = fmt;
}
setInterval(updateClock, 1000);
updateClock();

// ========================================================================
// Data loading
// ========================================================================
async function loadData(force = false) {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  btn.textContent = '更新中...';
  try {
    const url = API_BASE + '/api/snapshot' + (force ? '?refresh=1' : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    state.snapshot = data;
    saveState();
    renderAll();
    btn.textContent = '更新';
  } catch (err) {
    console.error(err);
    // フォールバック: 保存済みデータを表示しつつエラー表示
    renderAll();
    document.getElementById('ai-summary').innerHTML =
      '<div class="err">バックエンド未接続: ' + escapeHtml(err.message) + '<br>' +
      'API_BASEを正しく設定してください。サンプルデータでUIだけ確認するなら下のmockData関数を使用。</div>';
    btn.textContent = '更新';
  } finally {
    btn.classList.remove('loading');
  }
}

// ========================================================================
// Rendering: AI Summary
// ========================================================================
function renderSummary() {
  const el = document.getElementById('ai-summary');
  if (!state.snapshot || !state.snapshot.summary) {
    el.innerHTML = '<div class="loading">データなし。更新ボタンを押してください。</div>';
    return;
  }
  const s = state.snapshot.summary;
  let html = '';
  if (s.verdict) {
    const cls = s.verdict_class || 'neutral';
    html += '<div class="verdict ' + cls + '">' + escapeHtml(s.verdict) + '</div>';
  }
  if (s.body) {
    html += '<p>' + escapeHtml(s.body).replace(/\n/g, '</p><p>') + '</p>';
  }
  if (s.bullets && s.bullets.length) {
    html += '<ul>';
    s.bullets.forEach(b => html += '<li>' + escapeHtml(b) + '</li>');
    html += '</ul>';
  }
  el.innerHTML = html;
}

// ========================================================================
// Rendering: Events
// ========================================================================
function renderEvents() {
  const grid = document.getElementById('events-grid');
  const events = (state.snapshot && state.snapshot.events) || defaultEvents();
  const now = new Date();
  grid.innerHTML = '';
  events.sort((a, b) => new Date(a.time) - new Date(b.time));
  events.forEach(ev => {
    const target = new Date(ev.time);
    const diffMs = target - now;
    const past = diffMs < 0;
    const totalMin = Math.abs(Math.round(diffMs / 60000));
    const totalHours = Math.floor(totalMin / 60);
    const days = Math.floor(totalHours / 24);
    const remH = totalHours % 24;
    const remM = totalMin % 60;
    let val;
    if (past) val = '完了';
    else if (days > 0) val = days + 'd ' + remH + 'h';
    else if (totalHours > 0) val = totalHours + 'h ' + remM + 'm';
    else val = remM + 'm';
    const imminent = !past && diffMs < 24 * 3600000;
    const card = document.createElement('div');
    card.className = 'ev-card' + (past ? ' past' : '') + (imminent ? ' imminent' : '');
    const dateStr = target.toLocaleString('ja-JP', {
      month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    card.innerHTML =
      '<div class="ev-label">' + escapeHtml(ev.name) + '</div>' +
      '<div class="ev-value num">' + val + '</div>' +
      '<div class="ev-sub">' + dateStr + '</div>';
    grid.appendChild(card);
  });
}
function defaultEvents() {
  return [
    { name: 'NVDA決算', time: '2026-05-21T06:00' },
    { name: 'FOMC議事録', time: '2026-05-21T03:00' },
    { name: 'Walmart決算', time: '2026-05-21T20:00' }
  ];
}
setInterval(renderEvents, 60000);

// ========================================================================
// Rendering: Macro
// ========================================================================
function renderMacro() {
  const grid = document.getElementById('macro-grid');
  const macro = state.snapshot && state.snapshot.macro;
  if (!macro || !macro.indicators) {
    grid.innerHTML = '<div class="loading" style="grid-column: 1 / -1;">データなし</div>';
    document.getElementById('macro-updated').textContent = '—';
    return;
  }
  grid.innerHTML = '';
  macro.indicators.forEach(m => {
    const cell = document.createElement('div');
    cell.className = 'macro-cell ' + (m.status || '');
    let chgHtml = '';
    if (m.change != null) {
      const dir = m.change >= 0 ? 'up' : 'down';
      const sign = m.change >= 0 ? '+' : '';
      chgHtml = '<div class="m-change ' + dir + ' num">' + sign + m.change + (m.change_unit || '') + '</div>';
    } else if (m.note) {
      chgHtml = '<div class="m-change">' + escapeHtml(m.note) + '</div>';
    }
    cell.innerHTML =
      '<div class="m-label">' + escapeHtml(m.label) + '</div>' +
      '<div class="m-value num">' + escapeHtml(m.value) + (m.unit || '') + '</div>' +
      chgHtml;
    grid.appendChild(cell);
  });
  if (macro.updated) {
    document.getElementById('macro-updated').textContent =
      '更新: ' + new Date(macro.updated).toLocaleString('ja-JP', {
        month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
      });
  }
}

// ========================================================================
// Rendering: Scenarios (AI generated)
// ========================================================================
function renderScenarios() {
  const list = document.getElementById('scenarios-list');
  const summary = document.getElementById('scn-summary');
  const scns = state.snapshot && state.snapshot.scenarios;
  if (!scns || !scns.length) {
    list.innerHTML = '<div class="loading">データなし</div>';
    summary.style.display = 'none';
    return;
  }
  list.innerHTML = '';
  let total = 0, ev = 0;
  scns.forEach(s => {
    total += s.prob;
    ev += (s.prob / 100) * s.expected_return;
    const item = document.createElement('div');
    item.className = 'scn-item';
    const retCls = s.expected_return >= 0 ? 'pos' : 'neg';
    const retSign = s.expected_return >= 0 ? '+' : '';
    item.innerHTML =
      '<div class="scn-head">' +
        '<div class="scn-name">' + escapeHtml(s.name) +
          '<span class="ret ' + retCls + ' num">' + retSign + s.expected_return + '%</span>' +
        '</div>' +
        '<div class="scn-prob num">' + s.prob + '%</div>' +
      '</div>' +
      '<div class="scn-rationale">' + escapeHtml(s.rationale || '') + '</div>' +
      '<div class="scn-bar"><div class="scn-bar-fill" style="width: ' + s.prob + '%"></div></div>';
    list.appendChild(item);
  });
  const evR = Math.round(ev * 10) / 10;
  const evEl = document.getElementById('ev-total');
  evEl.textContent = (evR >= 0 ? '+' : '') + evR.toFixed(1) + '%';
  evEl.className = 'ev-value ' + (evR >= 0 ? 'pos' : 'neg');
  summary.style.display = 'flex';
}

// ========================================================================
// Rendering: Watchlist
// ========================================================================
function renderWatchlist() {
  const c = document.getElementById('watchlist');
  const w = state.snapshot && state.snapshot.watchlist;
  if (!w || !w.length) {
    c.innerHTML = '<div class="loading">データなし</div>';
    return;
  }
  c.innerHTML = '';
  w.forEach(item => {
    const row = document.createElement('div');
    row.className = 'watch-row';
    const chgCls = item.change_pct >= 0 ? 'up' : 'down';
    const chgSign = item.change_pct >= 0 ? '+' : '';
    const trigCls = item.trigger_class || '';
    row.innerHTML =
      '<div>' +
        '<div class="watch-name">' + escapeHtml(item.name) + '</div>' +
        '<div class="watch-sub">' + escapeHtml(item.symbol || '') + '</div>' +
      '</div>' +
      '<div class="watch-price num">' + escapeHtml(item.price || '—') +
        '<span class="chg ' + chgCls + '">' + chgSign + (item.change_pct || 0) + '%</span>' +
      '</div>' +
      '<div class="watch-trigger ' + trigCls + '">' +
        '<span class="lbl">エントリー水準</span>' +
        '<span class="val">' + escapeHtml(item.entry_trigger || '—') + '</span>' +
      '</div>' +
      '<div class="watch-trigger danger">' +
        '<span class="lbl">損切り</span>' +
        '<span class="val">' + escapeHtml(item.stop_loss || '—') + '</span>' +
      '</div>';
    c.appendChild(row);
  });
}

// ========================================================================
// Rendering: Checklist
// ========================================================================
function renderChecklist() {
  const c = document.getElementById('checklist-container');
  c.innerHTML = '';
  let total = 0, done = 0;
  state.checklist.forEach((g, gi) => {
    const group = document.createElement('div');
    group.className = 'check-group';
    group.innerHTML = '<div class="check-group-title">' + escapeHtml(g.group) + '</div>';
    g.items.forEach((it, ii) => {
      total++;
      if (it.done) done++;
      const row = document.createElement('label');
      row.className = 'check-row' + (it.done ? ' done' : '');
      row.innerHTML =
        '<input type="checkbox" ' + (it.done ? 'checked' : '') + ' data-gi="' + gi + '" data-ii="' + ii + '">' +
        '<div class="ck-text">' + escapeHtml(it.text) + '</div>';
      group.appendChild(row);
    });
    c.appendChild(group);
  });
  c.querySelectorAll('input[type="checkbox"]').forEach(i => {
    i.addEventListener('change', onCheck);
  });
  document.getElementById('check-count').textContent = done;
  document.getElementById('check-total').textContent = total;
  const stEl = document.getElementById('check-status');
  stEl.classList.remove('locked', 'partial', 'cleared');
  if (done === total) { stEl.textContent = '1/3 サイズ許可'; stEl.classList.add('cleared'); }
  else if (done >= Math.ceil(total * 0.66)) { stEl.textContent = '準備中・まだ禁止'; stEl.classList.add('partial'); }
  else { stEl.textContent = 'ポジション禁止'; stEl.classList.add('locked'); }
}
function onCheck(e) {
  const gi = +e.target.dataset.gi, ii = +e.target.dataset.ii;
  state.checklist[gi].items[ii].done = e.target.checked;
  saveState();
  renderChecklist();
}

// ========================================================================
// Utils
// ========================================================================
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function renderAll() {
  renderSummary();
  renderEvents();
  renderMacro();
  renderScenarios();
  renderWatchlist();
  renderChecklist();
}

// ========================================================================
// Init
// ========================================================================
loadState();
renderAll();
loadData();
</script>
</body>

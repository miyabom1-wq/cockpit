.notrade{border:0;border-radius:18px;padding:18px 19px;box-shadow:var(--shadow)}.notrade-head{gap:11px}.notrade-icon{width:34px;height:34px;display:grid;place-items:center;border-radius:11px;background:rgba(255,255,255,.58)}.notrade-title{font-size:16px}.notrade-sub{font-weight:500}.summary-chips{font-family:"Inter","Noto Sans JP",sans-serif;font-size:11px}
.macro-list{overflow:hidden}.macro-row{padding:12px 15px;border-color:#edf0f4;transition:background .14s}.macro-row:hover{background:#fafbfd}.macro-name{font-family:"Inter","Noto Sans JP",sans-serif;font-size:13px;font-weight:600}.macro-price,.macro-chg{font-family:"Inter",var(--mono);font-variant-numeric:tabular-nums}
.event-next{padding:15px 16px}.event-ic{width:34px;height:34px;display:grid;place-items:center;border-radius:11px;background:var(--blueBg);color:var(--blue)}
.badge{border-radius:999px;padding:3px 8px;font-size:9px;letter-spacing:.015em}.badge.A{background:#e8f5ef;color:#167a54}.badge.B{background:#eef0ff;color:#5c4fc2}.badge.C{background:#edf3ff;color:#315fae}.badge.D{background:#f0f2f5;color:#667180}.badge.E{background:#fdecef;color:#c9364c}
.lane{margin:10px 0;overflow:hidden}.lane>summary{padding:13px 15px;background:#fff;border:0}.lane[open]>summary{border-bottom:1px solid #edf0f4}.lane-symbol{width:29px;height:29px;display:grid;place-items:center;border-radius:9px;background:#f2f4f7;color:#667180}.lane-A .lane-symbol{background:var(--greenBg);color:var(--green)}.lane-B .lane-symbol{background:var(--purpleBg);color:var(--purple)}.lane-C .lane-symbol{background:var(--blueBg);color:var(--blue)}.lane-E .lane-symbol{background:var(--redBg);color:var(--red)}.lane-title{font-size:13px}.count{padding:3px 8px;border-radius:999px;background:#f1f3f6;font-size:10px}
.candidate{margin:8px 9px;padding:11px 12px;border:1px solid #e8ebf0!important;border-radius:13px;background:#fbfcfd;box-shadow:0 1px 1px rgba(18,27,44,.02);transition:transform .12s,background .12s,border-color .12s}.candidate:hover{background:#fff;border-color:#d9dee7!important}.candidate:active{transform:scale(.995)}.candidate-head{gap:8px}.candidate .name{font-size:13px;letter-spacing:-.01em}.code{font-size:10px}.chart-btn{width:31px;height:31px;border:0;background:#f0f3f7;color:#556173;border-radius:9px;box-shadow:none}.chart-btn:hover{background:#e7ebf1}.meta{font-family:"Inter",var(--mono);font-size:10px;gap:5px 11px}.tags{margin-top:7px}
.rank-row,.compact-row{border:1px solid #e4e8ee;border-radius:14px;padding:11px 13px;margin:7px 0;box-shadow:0 2px 8px rgba(18,27,44,.025)}
.note{background:#f7f9fc;border-color:#e4e9f1;border-radius:13px;color:#647083}.detail-block{font-weight:500}.detail-label{letter-spacing:.04em}
.formgrid input,.formgrid select,.formgrid textarea,.fullinput,#watch-sort{border-color:#d9dee7;border-radius:10px;background:#fff;padding:9px 11px;outline:none}.formgrid input:focus,.formgrid select:focus,.formgrid textarea:focus,.fullinput:focus,#watch-sort:focus{border-color:#7897d8;box-shadow:0 0 0 3px rgba(50,103,214,.1)}
.modal-bg{background:rgba(11,17,27,.48);backdrop-filter:blur(7px)}.modal{border:0;border-radius:22px;padding:20px;box-shadow:var(--shadowLg)}.modal-title{font-size:16px}.close{border:0;background:#f1f3f6;width:34px;height:34px;padding:0;border-radius:10px;font-size:0}
.toast{border:0;background:#182130;color:#fff;border-radius:12px;box-shadow:0 14px 36px rgba(18,27,44,.22)}
footer{border:0;color:#98a0ac;letter-spacing:.04em}
@media(max-width:640px){
 body{padding:12px 11px calc(70px + env(safe-area-inset-bottom))}
 header{flex-wrap:nowrap}.brand-mark{width:34px;height:34px}.brand{font-size:18px}.clock{display:none}.iconbtn{margin-left:auto}
 .tabs{margin-bottom:14px}.tabs button{padding:9px 8px;font-size:12px}.tab-icon{width:15px;height:15px}
 .segment{position:sticky;top:6px;z-index:12;box-shadow:0 6px 16px rgba(18,27,44,.07)}
 .candidate{margin:7px;padding:10px}.candidate .name{font-size:13px}.meta{gap:5px 9px}
 .state-grid{grid-template-columns:1fr 1fr}.state-box{padding:13px}.state-box .v{font-size:16px}
 .actions button{flex:0 1 auto}.modal{border-radius:22px 22px 0 0}
}

@media(max-width:640px){.bt-grid{grid-template-columns:1fr}.bt-main{gap:5px}.bt-card{padding:13px}.bt-symbol{grid-template-columns:1fr auto auto}.bt-symbol .bt-n{display:none}}
</style>

</head>
<body>
<div class="offline" id="offline">オフライン</div>
<header>
  <div class="brand-wrap"><div class="brand-mark"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M7.5 8.5 16 24 24.5 8.5" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M11.5 8.5 16 16.7l4.5-8.2" fill="none" stroke="currentColor" stroke-width="1.4" opacity=".45"/></svg></div><div class="brand">VANTAGE</div></div>
  <div class="header-spacer"></div><div class="clock" id="clock"></div>
  <button class="iconbtn" onclick="openSettings()" aria-label="設定"><span class="btn-label"><svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04-2.78 2.78-.04-.04A1.8 1.8 0 0 0 15 19.4a1.8 1.8 0 0 0-1 .6 1.8 1.8 0 0 0-.4 1.2V21h-3.2v-.06A1.8 1.8 0 0 0 9 19.4a1.8 1.8 0 0 0-1.98.36l-.04.04-2.78-2.78.04-.04A1.8 1.8 0 0 0 4.6 15a1.8 1.8 0 0 0-.6-1 1.8 1.8 0 0 0-1.2-.4H2.7v-3.2h.06A1.8 1.8 0 0 0 4.6 9a1.8 1.8 0 0 0-.36-1.98L4.2 6.98 6.98 4.2l.04.04A1.8 1.8 0 0 0 9 4.6a1.8 1.8 0 0 0 1-.6 1.8 1.8 0 0 0 .4-1.2V2.7h3.2v.06A1.8 1.8 0 0 0 15 4.6a1.8 1.8 0 0 0 1.98-.36l.04-.04 2.78 2.78-.04.04A1.8 1.8 0 0 0 19.4 9a1.8 1.8 0 0 0 .6 1 1.8 1.8 0 0 0 1.2.4h.1v3.2h-.06A1.8 1.8 0 0 0 19.4 15Z"/></svg><span>設定</span></span></button>
</header>
<nav class="tabs">
  <button class="active" data-tab="stage" onclick="switchTab('stage')"><svg class="ui-icon tab-icon" viewBox="0 0 24 24"><path d="M3 12h4l2.4-6 4.1 12 2.4-6H21"/></svg><span>Stage</span></button>
  <button data-tab="watch" onclick="switchTab('watch')"><svg class="ui-icon tab-icon" viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.5"/></svg><span>ウォッチ</span></button>
  <button data-tab="events" onclick="switchTab('events')"><svg class="ui-icon tab-icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4M16 3v4M3 10h18"/></svg><span>イベント</span></button>
</nav>

<main>
<section id="tab-stage" class="panel active">
  <div class="toolbar market">
    <button id="m-jp" class="active" onclick="setMarket('jp')">日本</button>
    <button id="m-us" onclick="setMarket('us')">米国</button>
    <span class="fresh" id="stage-fresh">取得中…</span>
  </div>
  <div class="segment grow">
    <button class="active" data-stage-view="summary" onclick="setStageView('summary')"><svg class="ui-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg><span>サマリー</span></button>
    <button data-stage-view="board" onclick="setStageView('board')"><svg class="ui-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="M12 2v3M22 12h-3M12 22v-3M2 12h3"/></svg><span>候補ボード</span></button>
    <button data-stage-view="ranking" onclick="setStageView('ranking')"><svg class="ui-icon" viewBox="0 0 24 24"><path d="M5 19V9M12 19V5M19 19v-7"/></svg><span>ランキング</span></button>
  </div>
  <div id="stage-summary"></div>
  <div id="stage-board" class="hidden"></div>
  <div id="stage-ranking" class="hidden"></div>
</section>

<section id="tab-watch" class="panel">
  <div class="segment grow">
    <button class="active" data-watch-view="list" onclick="setWatchView('list')">ウォッチ</button>
    <button data-watch-view="signals" onclick="setWatchView('signals')">シグナル検証</button>
    <button data-watch-view="backtest" onclick="setWatchView('backtest')">バックテスト</button>
  </div>
  <div id="watch-list-view">
    <div class="toolbar">
      <select id="watch-sort" onchange="setWatchSort(this.value)">
        <option value="board">候補ボード順</option>
        <option value="added">追加日順</option>
        <option value="market">市場別</option>
      </select>
      <button class="primary small" onclick="openAddWatch()">＋追加</button>
    </div>
    <div id="watch-list"></div>
  </div>
  <div id="signals-view" class="hidden"><div id="signal-list"></div></div>
  <div id="backtest-view" class="hidden"><div id="backtest-list"></div></div>
</section>

<section id="tab-events" class="panel">
  <div class="toolbar">
    <button class="primary" onclick="copyAI(this)"><span class="btn-label"><svg class="ui-icon" viewBox="0 0 24 24"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg><span>AI分析用コピー</span></span></button>
    <button onclick="openEventForm()"><span class="btn-label"><svg class="ui-icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span>追加</span></span></button>
    <button class="small" onclick="clearPastEvents()"><span class="btn-label"><svg class="ui-icon" viewBox="0 0 24 24"><path d="M4 7h16M6 7v13h12V7M3 4h18v3H3zM10 11h4"/></svg><span>過去分を整理</span></span></button>
  </div>
  <div id="event-list"></div>
</section>
</main>
<footer>VANTAGE · モメンタム投資判断支援</footer>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head"><div class="modal-title" id="modal-title"></div><button class="close" onclick="closeModal()" aria-label="閉じる"><svg class="ui-icon" viewBox="0 0 24 24"><path d="m7 7 10 10M17 7 7 17"/></svg></button></div>
    <div id="modal-body"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API_BASE=location.hostname==='localhost'?'http://localhost:8787':'https://cockpit-backend.miyab.workers.dev';
const state={
 tab:'stage',market:'jp',stageView:'summary',watchView:'list',
 stage:{jp:null,us:null},notrade:{jp:null,us:null},momentum:{jp:null,us:null},
 ranking:{jp:null,us:null},watch:null,signals:null,backtest:null,events:null,positions:null,
 watchSort:localStorage.getItem('vantage_watch_sort')||'board'
};
const $=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const attr=v=>esc(v).replace(/`/g,'&#96;');
const ICON_PATHS={
 chart:'<path d="M4 19V5M4 19h16"/><path d="m7 15 4-4 3 2 5-6"/>',
 check:'<path d="M7.5 12.5 10.5 15.5 17 8.5"/><path d="M12 3 4.5 6v5.5c0 4.4 3.1 7.7 7.5 9.5 4.4-1.8 7.5-5.1 7.5-9.5V6L12 3Z"/>',
 alert:'<path d="M12 3 2.8 19h18.4L12 3Z"/><path d="M12 9v4M12 16.5h.01"/>',
 stop:'<path d="M8 3h8l5 5v8l-5 5H8l-5-5V8l5-5Z"/><path d="M12 8v5M12 16h.01"/>',
 calendar:'<rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4M16 3v4M3 10h18"/>',
 flame:'<path d="M12 22c4.2 0 7-2.8 7-6.8 0-4.7-3.7-7.6-6.2-10.7-.5 2.7-2 4.4-3.8 5.9-.4-1.2-.5-2.4-.2-3.7C6.1 8.8 5 11.5 5 14.5 5 18.8 7.8 22 12 22Z"/>',
 rocket:'<path d="M14 4c2.8-2.1 5.4-1.9 7-1-1.1 3.8-3.5 7-7 9.2L9.8 8c1.2-1.6 2.6-2.9 4.2-4Z"/><path d="m9.8 8-4.5.6-2.3 2.3 4.9.8M14 12.2l-.6 4.5-2.3 2.3-.8-4.9M8.5 15.5 5 19"/><circle cx="15.5" cy="7.5" r="1.5"/>',
 clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
 eye:'<path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.5"/>',
 warning:'<path d="M12 3 2.8 19h18.4L12 3Z"/><path d="M12 9v4M12 16.5h.01"/>',
 pin:'<path d="m14 4 6 6-3 1-4 4-1 5-2-2-4-4-2-2 5-1 4-4 1-3Z"/>',
 trash:'<path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13M10 11v5M14 11v5"/>',
 chevron:'<path d="m9 18 6-6-6-6"/>',
 held:'<path d="M5 12.5 9.5 17 19 7.5"/>',
};
function icon(name,size=16,extra=''){return `<svg class="ui-icon ${extra}" width="${size}" height="${size}" viewBox="0 0 24 24" aria-hidden="true">${ICON_PATHS[name]||''}</svg>`}
function laneIcon(key){return icon(key==='A'?'flame':key==='B'?'rocket':key==='C'?'clock':key==='E'?'warning':'eye',15)}

const num=(v,d=2)=>v==null||Number.isNaN(Number(v))?'—':Number(v).toLocaleString('ja-JP',{maximumFractionDigits:d});
const pct=v=>v==null||Number.isNaN(Number(v))?'—':(Number(v)>=0?'+':'')+Number(v).toFixed(1)+'%';
const cls=v=>Number(v)>=0?'up':'down';
const code=s=>String(s||'').replace(/\.T$/,'');
const marketOf=s=>String(s||'').endsWith('.T')?'jp':'us';
const dateText=v=>{if(!v)return'—';const d=new Date(v);return Number.isNaN(d.getTime())?String(v):d.toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function writeHeaders(){const h={'Content-Type':'application/json'};const k=localStorage.getItem('vantage_write_key');if(k)h['X-Vantage-Key']=k;return h}
async function api(path,opt={}){
 const options={...opt};if(options.body&&typeof options.body!=='string')options.body=JSON.stringify(options.body);
 if(options.write||options.method&&options.method!=='GET'){options.headers={...writeHeaders(),...(options.headers||{})};delete options.write}
 const r=await fetch(API_BASE+path,options);let d=null;try{d=await r.json()}catch{}
 if(!r.ok)throw new Error(d?.error||('API '+r.status));return d;
}
function toast(msg){const e=$('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800)}
function updateClock(){$('clock').textContent=new Date().toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false})}
setInterval(updateClock,30000);updateClock();
function net(){ $('offline').classList.toggle('show',!navigator.onLine)}addEventListener('online',net);addEventListener('offline',net);net();

function switchTab(tab){
 state.tab=tab;document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
 document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+tab));
 if(tab==='stage')loadStage();
 if(tab==='watch')state.watchView==='signals'?loadSignals():state.watchView==='backtest'?loadBacktest():loadWatch();
 if(tab==='events')loadEvents();
 scrollTo({top:0});
}
function setMarket(m){
 state.market=m;$('m-jp').classList.toggle('active',m==='jp');$('m-us').classList.toggle('active',m==='us');loadStage();
}
function setStageView(v){
 state.stageView=v;document.querySelectorAll('[data-stage-view]').forEach(b=>b.classList.toggle('active',b.dataset.stageView===v));
 $('stage-summary').classList.toggle('hidden',v!=='summary');$('stage-board').classList.toggle('hidden',v!=='board');$('stage-ranking').classList.toggle('hidden',v!=='ranking');
 if(v==='ranking')loadRanking();
}
function setWatchView(v){
 state.watchView=['list','signals','backtest'].includes(v)?v:'list';document.querySelectorAll('[data-watch-view]').forEach(b=>b.classList.toggle('active',b.dataset.watchView===state.watchView));
 $('watch-list-view').classList.toggle('hidden',state.watchView!=='list');$('signals-view').classList.toggle('hidden',state.watchView!=='signals');$('backtest-view').classList.toggle('hidden',state.watchView!=='backtest');
 state.watchView==='signals'?loadSignals():state.watchView==='backtest'?loadBacktest():loadWatch();
}

async function loadStage(){
 const m=state.market;$('stage-fresh').textContent='取得中…';
 try{
  const [st,nt,mom,pos,ev,bt]=await Promise.all([
   api('/api/stage?market='+m),api('/api/notrade?market='+m),api('/api/momentum?market='+m),
   api('/api/positions').catch(()=>({positions:[]})),api('/api/events').catch(()=>({events:[]})),
   api('/api/backtest').catch(()=>state.backtest),
  ]);
  state.stage[m]=st;state.notrade[m]=nt;state.momentum[m]=mom;state.positions=pos;state.events=ev;if(bt)state.backtest=bt;
  $('stage-fresh').textContent=(st.freshness||'')+(st.price_time?' · '+st.price_time:'')+(st.vol_partial?' · 暫定':'');
  renderSummary(m);renderBoard(m);
 }catch(e){$('stage-fresh').textContent='取得失敗';$('stage-summary').innerHTML='<div class="card pad down">'+esc(e.message)+'</div>'}
}
function marketState(st,m){
 const macro=st?.macro||{};const ix=m==='jp'?macro['日経平均']:macro['S&P500'];
 const d=ix?.change_pct??0,r5=ix?.ret5??0;
 if(d>0&&r5>0)return{label:'上向き',kind:'good'};
 if(d<-1||r5<-2)return{label:'弱い',kind:'bad'};
 return{label:'中立',kind:'warn'};
}
function momentumState(nt){
 if(nt?.recLevel==='strong')return{label:'過熱・回避',kind:'bad'};
 if(nt?.recLevel==='recommend')return{label:'選別',kind:'warn'};
 return{label:'通常',kind:'good'};
}
function nextEvent(){
 const now=Date.now(),list=(state.events?.events||[]).filter(e=>new Date(e.time)>now).sort((a,b)=>new Date(a.time)-new Date(b.time));
 return list[0]||null;
}
function renderSummary(m){
 const st=state.stage[m],nt=state.notrade[m];if(!st)return;
 const ms=marketState(st,m),mm=momentumState(nt),macro=st.macro||{},ev=nextEvent();
 const hot=nt?.summary||{};
 const recKind=mm.kind==='bad'?'bad':mm.kind==='warn'?'warn':'good';
 const recIcon=icon(recKind==='bad'?'stop':recKind==='warn'?'alert':'check',20);
 const recTitle=recKind==='bad'?'新規エントリーは見送り':recKind==='warn'?'選別して確認':'通常監視';
 let html=`<div class="notrade ${recKind}"><div class="notrade-head"><span class="notrade-icon">${recIcon}</span><span class="notrade-title">${recTitle}</span><span class="notrade-sub">市場 ${ms.label} / モメンタム ${mm.label}</span></div>`+
  `<div class="summary-chips"><span>拡張過大 <b>${hot.extreme_pct??'—'}%</b></span><span>RSI過熱 <b>${hot.rsi_hot??'—'}件</b></span><span>健全な押し目 <b>${hot.healthy_dips??'—'}件</b></span><span>上ヒゲ <b>${hot.shooting_stars??'—'}件</b></span></div>`;
 if(nt?.signals?.length)html+=`<div class="warnline">${nt.signals.slice(0,3).map(x=>esc(x.label)+'：'+esc(x.detail)).join('<br>')}</div>`;
 html+='</div>';
 html+='<div class="section-title">地合い</div><div class="state-grid">'+
  `<div class="state-box ${ms.kind}"><div class="k">市場地合い</div><div class="v">${ms.label}</div></div>`+
  `<div class="state-box ${mm.kind}"><div class="k">モメンタム地合い</div><div class="v">${mm.label}</div></div></div>`;
 if(ev)html+=`<div class="section-title">次の重要日程</div><div class="card pad event-next"><div class="event-ic">${icon('calendar',18)}</div><div class="grow1"><div class="event-name">${esc(ev.name)}</div><div class="event-time">${dateText(ev.time)}</div></div></div>`;
 html+='<div class="section-title">マクロ / 指数</div><div class="item-list macro-list">'+
  Object.entries(macro).filter(([,v])=>v).map(([k,v])=>`<div class="macro-row" onclick="openMacroChart('${attr(k)}')"><div><div class="macro-name">${esc(k)}</div><div class="macro-sub">${v.ret5!=null?'5日 '+pct(v.ret5):''}</div></div><div class="macro-price">${num(v.price)}</div><div class="macro-chg ${cls(v.change_pct)}">${pct(v.change_pct)}</div></div>`).join('')+
  '</div>';
 $('stage-summary').innerHTML=html;
}
function openMacroChart(name){

function ruleCard(rule,research=false){
 const v=rule.validation||{},t=rule.test||{},h=rule.holdout||{};
 return `<div class="rule-card"><div class="rule-head"><span class="badge ${rule.strategy==='A'||rule.strategy==='C_A'?'A':'B'}">${rule.strategy.replace('_','→')}</span><span class="rule-name">${rule.market==='jp'?'日本':'米国'} ${research?'検証中':'厳選ルール'}</span><span class="${research?'badge C':'strict-badge'}">${research?'最終未確認':'最終試験合格'}</span></div><div class="rule-conditions">${esc((rule.labels||[]).join(' ＋ '))}</div><div class="rule-split"><div><div class="k">検証</div><div class="v">${num(v.win_rate,1)}% / n=${v.trades||0}</div></div><div><div class="k">最終試験</div><div class="v">${num(t.win_rate,1)}% / n=${t.trades||0}</div></div><div><div class="k">最終期待値</div><div class="v ${cls(t.expectancy)}">${pct(t.expectancy)}</div></div></div><div class="selective-stats"><span>PF ${num(t.profit_factor)}</span><span>中央値 ${pct(t.median_return)}</span><span>95%CI ${t.win_rate_ci_low??'—'}〜${t.win_rate_ci_high??'—'}%</span><span>検証+最終 ${num(h.win_rate,1)}%</span></div></div>`;
}
function renderBacktest(){
 const d=state.backtest||{},p=d.progress||{},total=p.total||0,done=p.done||0,rate=total?Math.min(100,done/total*100):0,status=d.status==='complete'?'完了':'自動集計中';
 let html=`<div class="bt-hero"><div class="bt-head"><div class="grow1"><div class="bt-title">登録銘柄バックテスト</div><div class="bt-sub">通常監視は変えず、過去5年を時系列で学習60%・検証20%・最終試験20%に分け、再現した条件だけ厳選候補へ反映します。</div></div><span class="badge ${d.status==='complete'?'A':'C'}">${status}</span></div><div class="bt-progress"><span style="width:${rate.toFixed(1)}%"></span></div><div class="bt-progress-meta"><span>${done}/${total}銘柄</span><span>エラー ${p.errors||0}</span></div><div class="actions"><button class="small" onclick="advanceBacktest(this)">5銘柄進める</button></div></div>`;
 if(d.using_previous_complete)html+='<div class="note">再集計中のため、成績欄は前回完了分を表示しています。</div>';
 const sel=d.selective||{},confirmed=sel.confirmed||[],research=sel.research||[];
 html+='<div class="section-title">厳選条件（未使用期間60%以上）</div>';
 if(d.status!=='complete')html+='<div class="card pad muted">全登録銘柄の再集計完了後に条件を確定します。途中値から厳選ルールは作りません。</div>';
 else if(!confirmed.length)html+='<div class="card pad">勝率60%だけでなく、最終試験の期待値・PF・中央値・サンプル数まで満たす条件はありませんでした。候補を無理に表示しません。</div>';
 else html+='<div class="rule-grid">'+confirmed.map(r=>ruleCard(r,false)).join('')+'</div>';
 if(research.length)html+=`<details class="card"><summary class="row"><div class="name grow1">検証中の条件</div><span class="count">${research.length}件</span></summary><div class="pad"><div class="rule-grid">${research.map(r=>ruleCard(r,true)).join('')}</div></div></details>`;
 html+='<div class="section-title">基礎ルール別の成績</div><div class="bt-grid">';
 for(const key of ['A','B','C_A','C_B']){
  const x=d.strategies?.[key]||{},m=x.metrics||{},r=x.recent_metrics||{},v=btVerdict(m,r);
  html+=`<div class="bt-card"><div class="bt-card-head"><span class="badge ${key==='A'||key==='C_A'?'A':'B'}">${key.replace('_','→')}</span><span class="bt-card-title">${esc(x.label||key)}</span><span class="bt-verdict ${v.kind}">${v.label}</span></div><div class="bt-main">${btMetric(m.win_rate,'勝率')}${btMetric(m.expectancy,'期待値')}${btMetric(m.profit_factor,'PF','num')}</div><div class="bt-detail"><span>取引 n=${m.trades||0}</span><span>シグナル ${m.signals||0}</span><span>トリガー率 ${pct(m.trigger_rate)}</span><span>順序不明除外 ${m.ambiguous||0}</span><span>中央値 ${pct(m.median_return)}</span><span>平均利益 ${pct(m.avg_win)}</span><span>平均損失 ${pct(m.avg_loss)}</span><span>MAE中央値 ${pct(m.mae_median)}</span><span>MFE中央値 ${pct(m.mfe_median)}</span><span>平均保有 ${m.avg_hold??'—'}日</span><span>直近1年 ${pct(r.expectancy)}</span><span>取引列下振れ ${pct(m.trade_sequence_drawdown)}</span></div></div>`;
 }
 html+='</div>';
 const assumptions=d.assumptions||{};
 html+=`<div class="section-title">検証モデル</div><div class="card pad bt-model"><b>エントリー</b> ${esc(assumptions.entry||'—')}<br><b>見送り</b> シグナル終値から+${assumptions.gap_skip_pct??3}%超のギャップ<br><b>損切り</b> ${esc(assumptions.stop||'—')}<br><b>EXIT</b> ${esc(assumptions.exit||'—')}<br><b>同日順序不明</b> ${esc(assumptions.same_day_ambiguous||'—')}<br><b>コスト</b> 往復${assumptions.round_trip_cost_pct??.15}%控除</div>`;
 const rows=(d.symbols||[]).filter(x=>(x.trades||0)>=5).sort((a,b)=>(b.expectancy??-99)-(a.expectancy??-99)).slice(0,15);
 html+=`<details class="card"><summary class="row"><div class="name grow1">銘柄別・期待値上位</div><span class="count">${rows.length}件</span></summary>${rows.length?rows.map(x=>`<div class="bt-symbol" onclick="openBacktestSymbol('${x.market}','${attr(x.symbol)}')"><div><span class="name">${esc(x.name)}</span> <span class="code">${esc(code(x.symbol))}</span></div><span class="badge ${x.strategy==='A'||x.strategy==='C_A'?'A':'B'}">${x.strategy.replace('_','→')}</span><span class="bt-exp ${cls(x.expectancy)}">${pct(x.expectancy)}</span><span class="bt-n">n=${x.trades}</span></div>`).join(''):'<div class="empty">1銘柄5取引以上で表示</div>'}</details>`;
 html+='<div class="note">厳選条件は勝率だけを逆算しません。粗い条件を最大3つに限定し、学習期間で探索、検証期間で順位付け、最後の20%で未使用試験を行います。現在登録銘柄による参考検証のため、サバイバーシップ・バイアスは残ります。注文は送信しません。</div>';
 $('backtest-list').innerHTML=html;
}
async function advanceBacktest(btn){
 const old=btn.textContent;btn.disabled=true;btn.textContent='更新中…';
 try{await api('/api/backtest-run?count=5',{write:true});toast('最大5銘柄分を更新');state.backtest=null;await loadBacktest()}catch(e){toast(e.message)}finally{btn.disabled=false;btn.textContent=old}
}

async function openBacktestSymbol(market,symbol){
 try{
  const d=await api('/api/backtest-symbol?market='+market+'&symbol='+encodeURIComponent(symbol));if(!d.ok)throw new Error(d.error||'未集計');
  const r=d.result;$('modal-title').textContent=(r.name||r.symbol)+' '+code(r.symbol);
  let html=`<div class="note">検証期間 ${r.history_start||'—'} ～ ${r.history_end||'—'} / ${r.history_days||0}営業日</div>`;
  for(const key of ['A','B','C_A','C_B']){
   const x=r.strategies?.[key];if(!x)continue;const m=x.metrics||{},tr=(x.trades||[]).filter(t=>t.status==='trade').slice(-8).reverse();
   html+=`<details class="card" ${key==='A'?'open':''}><summary class="row"><span class="badge ${key==='A'||key==='C_A'?'A':'B'}">${key.replace('_','→')}</span><span class="name grow1">${esc(x.label||key)}</span><span class="num ${cls(m.expectancy)}">期待値 ${pct(m.expectancy)}</span><span class="count">n=${m.trades||0}</span></summary><div class="pad"><div class="meta"><span>勝率 ${pct(m.win_rate)}</span><span>PF ${m.profit_factor??'—'}</span><span>中央値 ${pct(m.median_return)}</span><span>MAE ${pct(m.mae_median)}</span></div>${tr.length?tr.map(t=>`<div class="bt-trade"><span class="date">${t.signal_date}</span><span>${esc(t.exit_reason||'')}</span><span class="${cls(t.return_pct)}">${pct(t.return_pct)}</span><span>MFE ${pct(t.mfe_pct)} / MAE ${pct(t.mae_pct)}</span></div>`).join(''):'<div class="empty">成立取引なし</div>'}</div></details>`;
  }
  $('modal-body').innerHTML=html;openModal();
 }catch(e){toast(e.message)}
}

async function loadEvents(){
 $('event-list').innerHTML='<div class="loading">取得中…</div>';
 try{state.events=await api('/api/events');renderEvents()}catch(e){$('event-list').innerHTML='<div class="card pad down">'+esc(e.message)+'</div>'}
}
function renderEvents(){
 const now=Date.now(),events=(state.events?.events||[]).slice().sort((a,b)=>new Date(a.time)-new Date(b.time));
 const future=events.filter(e=>new Date(e.time)>=now),past=events.filter(e=>new Date(e.time)<now);
 let html='<div class="section-title">今後の重要日程</div><div class="card">'+(future.length?future.map(eventRow).join(''):'<div class="empty">登録なし</div>')+'</div>';
 if(past.length)html+=`<details class="card"><summary class="row"><div class="name">過去分</div><span class="count">${past.length}件</span></summary>${past.map(eventRow).join('')}</details>`;
 $('event-list').innerHTML=html;
}
function eventRow(e){
 const diff=new Date(e.time)-Date.now(),days=Math.ceil(diff/86400000);
 return `<div class="row"><button class="small" aria-label="固定" title="固定" onclick="togglePin('${attr(e.id)}')">${icon('pin',15,e.pinned?'up':'')}</button><div class="grow1"><div class="name">${esc(e.name)}</div><div class="event-time">${dateText(e.time)}</div></div><div class="event-count">${diff>=0?(days<=1?'24h以内':days+'日'):'完了'}</div><button class="small danger" aria-label="削除" title="削除" onclick="deleteEvent('${attr(e.id)}')">${icon('trash',15)}</button></div>`;
}
function openEventForm(){
 $('modal-title').textContent='重要日程を追加';$('modal-body').innerHTML=`<div class="formgrid"><select id="ev-cat"><option value="macro">マクロ</option><option value="centralbank">中銀</option><option value="earnings">決算</option><option value="material">個別材料</option><option value="other">その他</option></select><input id="ev-name" placeholder="イベント名"><input class="span2" id="ev-time" type="datetime-local"><div class="span2 actions"><button class="primary" onclick="addEvent()">追加</button></div></div>`;openModal();
}
async function addEvent(){try{await api('/api/events',{method:'POST',body:{action:'add',name:$('ev-name').value,time:new Date($('ev-time').value).toISOString(),category:$('ev-cat').value}});closeModal();loadEvents()}catch(e){toast(e.message)}}
async function deleteEvent(id){if(!confirm('削除しますか？'))return;try{await api('/api/events',{method:'POST',body:{action:'delete',id}});loadEvents()}catch(e){toast(e.message)}}
async function togglePin(id){try{await api('/api/events',{method:'POST',body:{action:'toggle_pin',id}});loadEvents()}catch(e){toast(e.message)}}
async function clearPastEvents(){if(!confirm('過去の未固定イベントを削除しますか？'))return;try{const d=await api('/api/events',{method:'POST',body:{action:'clear_completed'}});toast(d.removed+'件整理');loadEvents()}catch(e){toast(e.message)}}

async function copyAI(btn){
 const old=btn.textContent;btn.disabled=true;btn.textContent='収集中…';
 try{
  const [jp,us,njp,nus,mjp,mus,w,sig,bt,ev,pos]=await Promise.all([
   api('/api/stage?market=jp'),api('/api/stage?market=us'),api('/api/notrade?market=jp'),api('/api/notrade?market=us'),
   api('/api/momentum?market=jp'),api('/api/momentum?market=us'),api('/api/watchlist'),api('/api/signal-log?limit=60'),api('/api/backtest'),api('/api/events'),api('/api/positions')
  ]);
  const out=['# VANTAGE モメンタム分析用','目的: 自動売買ではなく、地合い・相対強度・出来高・短期セットアップを使った確認順の整理。'];
  for(const [label,st,nt,mom] of [['日本',jp,njp,mjp],['米国',us,nus,mus]]){
   const ms=marketState(st,label==='日本'?'jp':'us'),mm=momentumState(nt);
   out.push(`\n## ${label}市場\n- 市場地合い: ${ms.label}\n- モメンタム地合い: ${mm.label}\n- データ: ${st.price_time||st.updated_at||'—'}`);
   const mac=st.macro||{};for(const k of ['日経平均','S&P500','韓国KOSPI','韓国KOSDAQ','SOX','VIX','ドル円'])if(mac[k])out.push(`- ${k}: ${pct(mac[k].change_pct)} / 5日 ${pct(mac[k].ret5)}`);
   for(const lane of mom.board||[]){
    if(!['A','B','C'].includes(lane.key))continue;const limit=lane.key==='C'?3:lane.rows.length;
    out.push(`\n### ${lane.key}. ${lane.label}`);
    for(const r of (lane.rows||[]).slice(0,limit))out.push(`- ${r.name}(${r.symbol}) ${pct(r.change_pct)} / 出来高${num(r.effective_vol_ratio??r.vol_ratio)}x / 25MA${pct(r.div25)} / 5日RS${pct(r.rs5)} / 長期${r.long_stage||r.stage}${r.setup_label?' / '+r.setup_label:''}`);
   }
  }
  out.push('\n## 保有☑');for(const p of pos.positions||[])out.push(`- ${p.name||p.symbol}(${p.symbol})`);
  out.push('\n## ウォッチ');for(const x of (w.items||[]).slice(0,12))out.push(`- ${x.name}(${x.symbol}) / ${x.status||'tracking'}${x.memo?' / '+x.memo.slice(0,100):''}`);
  out.push('\n## シグナル実績');for(const s of sig.summary||[]){const d5=s.horizons?.d5;if(d5)out.push(`- ${s.label}: 5日中央値${pct(d5.median)} / 勝率${d5.win_rate}% / n=${d5.n}`)}
  out.push('\n## 登録銘柄バックテスト');for(const [k,x] of Object.entries(bt.strategies||{})){const m=x.metrics||{};if(m.trades)out.push(`- ${x.label||k}: 勝率${m.win_rate}% / 期待値${pct(m.expectancy)} / PF${m.profit_factor} / n=${m.trades} / 直近1年${pct(x.recent_metrics?.expectancy)}`)}
  out.push('\n## 厳選バックテスト条件');for(const r of bt.selective?.confirmed||[])out.push(`- ${r.market==='jp'?'日本':'米国'} ${r.strategy.replace('_','→')}: ${(r.labels||[]).join(' + ')} / 最終試験 勝率${r.test?.win_rate}% / 期待値${pct(r.test?.expectancy)} / PF${r.test?.profit_factor} / n=${r.test?.trades}`);if(!(bt.selective?.confirmed||[]).length)out.push('- 確認済み厳選条件なし');
  out.push('\n## 7日以内の重要日程');const limit=Date.now()+7*86400000;for(const e of (ev.events||[]).filter(x=>new Date(x.time)>=Date.now()&&new Date(x.time)<=limit).sort((a,b)=>new Date(a.time)-new Date(b.time)))out.push(`- ${e.name}: ${dateText(e.time)}`);
  out.push('\n## 依頼\nA/Bを中心に3〜5本へ絞り、エントリー候補・押し待ち・見送りを分けてください。長期Stageと短期セットアップを混同せず、相対強度・出来高・重要日程・保有との矛盾も指摘してください。');
  await navigator.clipboard.writeText(out.join('\n'));toast('コピーしました');
 }catch(e){toast(e.message)}finally{btn.disabled=false;btn.textContent=old}
}

function openSettings(){
 $('modal-title').textContent='設定';
 const key=localStorage.getItem('vantage_write_key')||'';
 $('modal-body').innerHTML=`<div class="card pad"><div class="detail-label">書き込みキー（任意）</div><input class="fullinput" id="write-key" type="password" value="${attr(key)}" placeholder="Cloudflare WRITE_TOKENを設定した場合"><div class="actions"><button onclick="saveWriteKey()">保存</button></div></div>`+
 `<div class="card pad"><div class="name">Stage管理</div><div class="actions"><button onclick="recalcStage()">現在市場を再計算</button><button onclick="openStockEditor()">銘柄編集</button></div></div>`+
 `<div class="card pad"><div class="name">指数通知</div><div class="actions"><button onclick="enablePush()">通知を有効化</button><button onclick="testPush()">テスト</button></div></div>`+
 `<div class="note">バックエンド状態は /api/health で確認できます。</div>`;
 openModal();
}
function saveWriteKey(){localStorage.setItem('vantage_write_key',$('write-key').value.trim());toast('保存しました')}
async function recalcStage(){
 if(!confirm((state.market==='jp'?'日本':'米国')+'を再計算します。数十秒かかります。'))return;
 try{for(let i=1;i<=4;i++){toast('再計算 '+i+'/4');await api('/api/stage-run?batch='+state.market+i,{write:true})}await api('/api/ranking-enriched?market='+state.market+'&refresh=1',{write:true});toast('完了');closeModal();loadStage()}catch(e){toast(e.message)}
}
async function openStockEditor(){
 try{const d=await api('/api/stocklist?market='+state.market);$('modal-title').textContent='銘柄編集 '+d.count+'/'+d.max;
 $('modal-body').innerHTML=`<div class="formgrid"><input id="sl-symbol" placeholder="ティッカー"><input id="sl-name" placeholder="名称（空欄可）"><div class="span2 actions"><button class="primary" onclick="addStock()">追加</button></div></div><div class="card">${(d.list||[]).map(x=>`<div class="row"><div class="grow1"><span class="name">${esc(x.name)}</span> <span class="code">${esc(x.symbol)}</span></div><button class="small danger" onclick="deleteStock('${attr(x.symbol)}')">×</button></div>`).join('')}</div>`;}catch(e){toast(e.message)}
}
async function addStock(){try{await api('/api/stocklist?market='+state.market,{method:'POST',body:{action:'add',symbol:$('sl-symbol').value,name:$('sl-name').value}});openStockEditor()}catch(e){toast(e.message)}}
async function deleteStock(symbol){if(!confirm(symbol+'を削除しますか？'))return;try{await api('/api/stocklist?market='+state.market,{method:'POST',body:{action:'delete',symbol}});openStockEditor()}catch(e){toast(e.message)}}
function b64ToBytes(s){const pad='='.repeat((4-s.length%4)%4),b=atob((s+pad).replace(/-/g,'+').replace(/_/g,'/'));return Uint8Array.from([...b].map(c=>c.charCodeAt(0)))}
async function enablePush(){try{const perm=await Notification.requestPermission();if(perm!=='granted')throw new Error('通知が許可されていません');const reg=await navigator.serviceWorker.ready;const k=await api('/api/push/key');let sub=await reg.pushManager.getSubscription();if(!sub)sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64ToBytes(k.key)});await api('/api/push/subscribe',{method:'POST',body:{subscription:sub.toJSON()}});toast('通知を有効化')}catch(e){toast(e.message)}}
async function testPush(){try{await api('/api/push/test',{write:true});toast('送信しました')}catch(e){toast(e.message)}}

function openModal(){$('modal-bg').classList.add('open')}function closeModal(){$('modal-bg').classList.remove('open')}
if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js?v=selective-backtest-v29').then(r=>r.update()).catch(()=>{}));
loadStage();
</script>
